<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>女也 She Is</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<style>
:root {
        --bg: #f7f3ee;
        --ink: #2e2e2e;
        --body: #555;
        --muted: #888;
        --accent: #4A3073;
        --accent-hover: #3D2565;
        --accent-soft: rgba(74,48,115,0.08);
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--body);
        font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", "SimSun", serif;
        line-height: 1.9;
      }

      .page {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        padding-bottom: 0;
      }

      .bg-accent-orb {
        position: fixed;
        pointer-events: none;
        z-index: 0;
        border-radius: 50%;
      }

      .bg-accent-orb--top {
        top: -140px;
        left: -120px;
        width: 500px;
        height: 500px;
        background: radial-gradient(ellipse at top left, rgba(74,48,115,0.18) 0%, transparent 60%);
        filter: blur(40px);
      }

      .bg-accent-orb--bottom {
        right: -100px;
        bottom: -120px;
        width: 400px;
        height: 400px;
        background: radial-gradient(ellipse at bottom right, rgba(74,48,115,0.12) 0%, transparent 60%);
        filter: blur(50px);
      }
      a,
      button {
        transition: opacity 0.3s ease;
      }
      a:hover {
        opacity: 0.72;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .page > * {
        animation: fadeInUp 0.5s ease forwards;
      }
      .page > *:nth-child(1) { animation-delay: 0s; }
      .page > *:nth-child(2) { animation-delay: 0.06s; }
      .page > *:nth-child(3) { animation-delay: 0.12s; }
      .page > *:nth-child(4) { animation-delay: 0.18s; }
      .page > *:nth-child(5) { animation-delay: 0.24s; }

      .header {
        padding: 14px 24px 2px;
      }

      .logo {
        margin: 0;
      }

      .logo-cn {
        display: block;
        font-family: "Cormorant Garamond", serif;
        font-size: 28px;
        line-height: 1;
        font-weight: 600;
        color: #1c1c1c;
        letter-spacing: 0.12em;
      }

      .logo-en {
        display: block;
        font-family: 'Courier Prime', monospace;
        font-size: 11px;
        color: #888;
        letter-spacing: 0.08em;
        margin-top: 2px;
      }

      .header-rule {
        height: 1px;
        margin: 0 0;
        background: linear-gradient(to right, transparent, rgba(74,48,115,0.5) 25%, rgba(74,48,115,0.5) 75%, transparent);
        border: none;
      }

      .hero {
        position: relative;
        overflow: hidden;
        height: 340px;
        min-height: 340px;
        max-height: 340px;
        margin: 0;
        padding: 0;
        background: #F7F3EE;
      }

      .hero-arc-svg {
        position: absolute;
        top: 8px;
        left: 50%;
        width: 128%;
        height: 78%;
        transform: translateX(-50%) scale(1.28);
        transform-origin: center top;
        pointer-events: none;
        overflow: visible;
        z-index: 8;
      }

      @keyframes waveBar {
        0%, 100% { transform: scaleY(0.35); }
        50% { transform: scaleY(1); }
      }

      .wbar { transform-origin: center; transform-box: fill-box; }
      .w1 { animation: waveBar 1.1s ease-in-out infinite 0s; }
      .w2 { animation: waveBar 0.9s ease-in-out infinite 0.1s; }
      .w3 { animation: waveBar 1.3s ease-in-out infinite 0.05s; }
      .w4 { animation: waveBar 0.8s ease-in-out infinite 0.2s; }
      .w5 { animation: waveBar 1s ease-in-out infinite 0s; }
      .w6 { animation: waveBar 0.85s ease-in-out infinite 0.15s; }
      .w7 { animation: waveBar 1.2s ease-in-out infinite 0.08s; }
      .w8 { animation: waveBar 0.95s ease-in-out infinite 0.12s; }
      .w9 { animation: waveBar 1.1s ease-in-out infinite 0.04s; }

      .section-index {
        padding: 0 24px;
        margin-top: 0;
      }

      .section-row {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 0;
        padding-left: 4px;
        padding-right: 4px;
        margin-left: -4px;
        margin-right: -4px;
        border-top: 0.5px solid #ddd8d1;
        border-radius: 8px;
        text-decoration: none;
        color: inherit;
        transition: background 0.25s ease;
      }

      .section-row:last-child {
        border-bottom: 0.5px solid #ddd8d1;
      }

      .section-row::before {
        content: '';
        position: absolute;
        left: -4px;
        top: 20%;
        height: 60%;
        width: 2px;
        background: var(--accent);
        border-radius: 1px;
        transform: scaleY(0);
        transform-origin: center;
        transition: transform 0.25s ease;
      }

      .section-row:hover {
        background: rgba(74,48,115,0.05);
      }

      .section-row:hover::before {
        transform: scaleY(1);
      }

      .section-row-content {
        position: relative;
        z-index: 2;
      }

      .section-row-title {
        font-family: 'Cormorant Garamond', serif;
        font-size: 22px;
        font-weight: 600;
        color: #2e2e2e;
        letter-spacing: 0.08em;
        margin: 0 0 2px 0;
      }

      .section-row--featured {
        border-left: 3px solid #4A3073;
        padding-left: 12px;
        margin-left: -4px;
      }

      .section-row--featured .section-row-title {
        font-size: 28px;
      }

      .section-row-bg-number {
        position: absolute;
        right: -10px;
        top: 50%;
        transform: translateY(-50%);
        font-family: 'Cormorant Garamond', serif;
        font-size: 80px;
        font-weight: 700;
        color: var(--accent);
        opacity: 0.08;
        line-height: 1;
        pointer-events: none;
        user-select: none;
        letter-spacing: -0.02em;
        z-index: 1;
      }

      .row-dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        margin-right: 8px;
        vertical-align: middle;
        margin-bottom: 2px;
      }

      .row-en-tag {
        font-family: 'Courier Prime', monospace;
        font-size: 10px;
        color: #c0b8b0;
        letter-spacing: 0.18em;
        font-weight: 400;
        margin-left: 10px;
        vertical-align: middle;
        position: relative;
        top: -2px;
      }

      .section-row-desc {
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        color: #888;
        margin: 0;
        letter-spacing: 0.02em;
        line-height: 1.75;
      }

      .section-row-arrow {
        font-size: 16px;
        color: #4A3073;
        opacity: 0.35;
        font-weight: 300;
        flex-shrink: 0;
      }

      .section-row:hover .section-row-arrow {
        transform: translateX(6px);
        color: var(--accent-hover);
      }

      footer {
        margin-top: 6px;
        margin-bottom: 0;
        padding-bottom: 12px;
        text-align: center;
        font-size: 11px;
        color: var(--muted);
      }

      .audio-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 100;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border: 1.5px solid rgba(44,44,44,0.15);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(44,32,20,0.12);
  transition: transform 0.2s ease, opacity 0.2s ease;
}
.audio-btn:hover { opacity: 0.85; transform: scale(1.08); }
.audio-btn.playing { animation: spin 4s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.audio-btn.playing:hover { animation-play-state: paused; }
.audio-btn svg { width: 18px; height: 18px; fill: #2e2e2e; }
      .typewriter-wrap {
        position: absolute;
        bottom: 72px;
        left: 0;
        right: 24px;
        text-align: right;
        z-index: 20;
        pointer-events: none;
      }
      .typewriter-text {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-style: italic;
        font-size: 12px;
        color: #4A3073;
        letter-spacing: 0.10em;
        opacity: 0.75;
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        max-width: 120px;
      }
      .tw-cursor {
        display: inline-block;
        animation: twBlink 0.8s step-end infinite;
        margin-left: 1px;
        opacity: 0.6;
      }
      @keyframes twBlink {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 0; }
      }
      .vi-glow {
        position: fixed;
        pointer-events: none;
        z-index: 0;
        border-radius: 50%;
        filter: blur(80px);
      }
      .vi-glow--top {
        width: 340px;
        height: 340px;
        top: -100px;
        right: -80px;
        background: radial-gradient(ellipse, rgba(74,48,115,0.07), transparent 70%);
      }
      .vi-glow--bottom {
        width: 280px;
        height: 280px;
        bottom: -60px;
        left: -60px;
        background: radial-gradient(ellipse, rgba(74,48,115,0.05), transparent 70%);
      }
    </style>

    <button class="audio-btn" id="audioBtn" title="播放 / 暂停" aria-label="播放 / 暂停背景音乐">
  <svg id="playIcon" viewBox="0 0 24 24" aria-hidden="true">

    <script>
      (function() {
        const audio = document.getElementById('bgAudio');
        const btn = document.getElementById('audioBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');

        audio.volume = 0.35;
        audio.muted = true;

        // 静音自动播
        audio.play().catch(function() {});

        // 首次任意交互后取消静音
        var unmuted = false;
        function unmute() {
          if (!unmuted) {
            audio.muted = false;
            unmuted = true;
            if (!audio.paused) {
              playIcon.style.display = 'none';
              pauseIcon.style.display = 'block';
              btn.classList.add('playing');
            }
          }
          if (!audio.paused) {
            btn.classList.add('playing');
          }
          document.removeEventListener('click', unmute);
          document.removeEventListener('touchstart', unmute);
        }
        document.addEventListener('click', unmute);
        document.addEventListener('touchstart', unmute);

        // 按钮手动控制
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          unmute();
          if (audio.paused) {
            audio.play();
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
            btn.classList.add('playing');
          } else {
            audio.pause();
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            btn.classList.remove('playing');
          }
        });
      })();
    </script>

    <script>
      (function() {
        const phrases = [
          'seen',
          'enough',
          'here',
          'real',
          'becoming',
          'trying',
          'loved'
        ];        let phraseIndex = 0;

        function typePhrase(text, callback) {
          let i = 0;
          el.textContent = 'she is ';
          el.style.opacity = '1';
          const timer = setInterval(() => {
            el.textContent = 'she is ' + text.slice(0, i + 1);
            i++;
            if (i >= text.length) {
              clearInterval(timer);
              setTimeout(callback, 1800);
            }
          }, 80);
        }

        function fadeOut(callback) {
          el.style.transition = 'opacity 0.6s ease';
          el.style.opacity = '0';
          setTimeout(callback, 700);
        }

        function loop() {
          const phrase = phrases[phraseIndex % phrases.length];
          phraseIndex++;
          typePhrase(phrase, () => {
            fadeOut(() => {
              setTimeout(loop, 200);
            });
          });
        }

        setTimeout(loop, 500);
      })();
    </script>
    <script>
    (function() {
      const words = ['tired','trying','enough','searching','becoming','seen','still here','afraid','soft','fierce','learning','changing','staying'];
      const el = document.getElementById('tw-word');
      if (!el) return;
      let wi = 0, ci = 0, deleting = false;
      function tick() {
        const word = words[wi];
        if (!deleting) {
          el.textContent = word.slice(0, ci + 1);
          ci++;
          if (ci === word.length) {
            deleting = true;
            setTimeout(tick, 1500);
            return;
          }
          setTimeout(tick, 90);
        } else {
          el.textContent = word.slice(0, ci - 1);
          ci--;
          if (ci === 0) {
            deleting = false;
            wi = (wi + 1) % words.length;
            setTimeout(tick, 300);
            return;
          }
          setTimeout(tick, 50);
        }
      }
      setTimeout(tick, 800);
    })();
  </script>
