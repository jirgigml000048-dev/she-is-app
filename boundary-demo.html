<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>边界感测评 Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #f5f0eb;
      --brand: #4A3073;
      --brand-soft: rgba(74, 48, 115, 0.08);
      --brand-quote: rgba(74, 48, 115, 0.04);
      --text: #333333;
      --text-muted: rgba(51, 51, 51, 0.64);
      --card: rgba(255, 255, 255, 0.68);
      --border: rgba(74, 48, 115, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Serif SC", Georgia, serif;
      min-height: 100vh;
    }

    .page {
      max-width: 390px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand);
      opacity: 0.82;
      margin-bottom: 14px;
    }

    .title {
      font-size: 28px;
      line-height: 1.35;
      color: var(--brand);
      margin: 0 0 12px;
      font-weight: 600;
    }

    .intro {
      font-size: 14px;
      line-height: 1.9;
      margin: 0 0 28px;
      color: var(--text);
    }

    .card {
      background: transparent;
    }

    .progress {
      font-size: 11px;
      letter-spacing: 0.14em;
      color: var(--brand);
      margin-bottom: 16px;
    }

    .question {
      font-size: 20px;
      line-height: 1.6;
      margin: 0 0 24px;
      color: var(--text);
      font-weight: 500;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.44);
      border-radius: 14px;
      padding: 16px 14px;
      text-align: left;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.85;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .option:hover {
      border-color: rgba(74, 48, 115, 0.3);
      transform: translateY(-1px);
    }

    .option.selected {
      border: 1px solid var(--brand);
      background: var(--brand-soft);
    }

    .option-label {
      display: inline-block;
      min-width: 20px;
      color: var(--brand);
      margin-right: 6px;
    }

    .actions {
      margin-top: 28px;
    }

    .btn {
      width: 100%;
      border: 1px solid var(--brand);
      border-radius: 999px;
      padding: 13px 18px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.2;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .btn:hover:not(:disabled) {
      opacity: 0.94;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.36;
      cursor: not-allowed;
    }

    .btn.secondary {
      background: transparent;
      color: var(--brand);
      margin-top: 28px;
    }

    .result-brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
      margin-bottom: 18px;
      border-bottom: 1px solid rgba(74, 48, 115, 0.08);
    }

    .result-brand-lockup {
      display: flex;
      align-items: baseline;
      gap: 8px;
      color: var(--brand);
    }

    .result-brand-cn {
      font-size: 14px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .result-brand-en {
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .result-title {
      font-size: 24px;
      line-height: 1.45;
      color: var(--brand);
      margin: 0 0 18px;
      font-weight: 600;
    }

    .quote {
      background: var(--brand-quote);
      padding: 16px;
      border-radius: 8px;
      color: var(--brand);
      font-size: 16px;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .body-copy,
    .section-content,
    .list {
      font-size: 14px;
      color: var(--text);
      line-height: 1.9;
    }

    .body-copy p,
    .section-content p {
      margin: 0 0 14px;
    }

    .body-copy p:last-child,
    .section-content p:last-child {
      margin-bottom: 0;
    }

    .section {
      margin-top: 24px;
    }

    .share-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(74, 48, 115, 0.08);
    }

    .share-btn {
      flex: 1;
      border: 1px solid var(--brand);
      background: #fff;
      color: var(--brand);
      border-radius: 8px;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.2;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .share-btn:hover {
      opacity: 0.94;
      transform: translateY(-1px);
    }

    .result-restart {
      margin-top: 24px;
    }

    .section-title {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--brand);
      border-left: 2px solid var(--brand);
      padding-left: 8px;
      margin: 0 0 12px;
      text-transform: uppercase;
    }

    .list {
      margin: 0;
      padding-left: 18px;
    }

    .list li + li {
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .share-preview-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .share-preview-dialog {
      position: relative;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .share-preview-image {
      display: block;
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .share-preview-tip {
      margin: 14px 0 0;
      color: rgba(255, 255, 255, 0.86);
      font-size: 13px;
      line-height: 1.7;
    }

    .share-preview-save {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 132px;
      margin-top: 14px;
      padding: 11px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 13px;
      text-decoration: none;
    }

    .share-preview-close {
      position: absolute;
      top: -10px;
      right: 0;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      padding: 4px;
    }
  </style>
</head>
<body>
  <main class="page">
    <section id="quizView" class="card">
      <div class="eyebrow">BOUNDARY QUIZ</div>
      <h1 class="title">边界感测评</h1>
      <p class="intro">10 道题，慢一点选。不是测你是不是“会拒绝”，而是看你通常在哪个位置，把自己放到了后面。</p>

      <div id="questionWrap">
        <div class="progress" id="progress"></div>
        <h2 class="question" id="questionText"></h2>
        <div class="options" id="options"></div>
        <div class="actions">
          <button class="btn" id="nextBtn" disabled>下一题</button>
        </div>
      </div>
    </section>

    <section id="resultView" class="hidden"></section>
  </main>

  <script>
    const questions = [
      {
        text: '伴侣说想周末一起出去，你其实更想一个人待着。你更可能：',
        options: [
          { label: 'A', tag: 'STABLE', text: '跟他说这周需要独处，下次再约' },
          { label: 'B', tag: 'EMOTIONAL', text: '答应去，因为不想让他失望' },
          { label: 'C', tag: 'INNER', text: '答应去，然后在心里模糊觉得有点不对劲' },
          { label: 'D', tag: 'SOCIAL', text: '如果大家都在说周末计划，你更难开口说自己不去' }
        ]
      },
      {
        text: '朋友讲了一个小时，你已经很疲了。你更可能：',
        options: [
          { label: 'A', tag: 'STABLE', text: '说一声「我现在有点累了，我们改天继续聊」' },
          { label: 'B', tag: 'INNER', text: '不确定自己是真累了还是今天状态差，就这么撑着' },
          { label: 'C', tag: 'EMOTIONAL', text: '继续听，怕她觉得你不在乎' },
          { label: 'D', tag: 'SOCIAL', text: '如果其他人也在场，你更不会先开口说要走' }
        ]
      },
      {
        text: '有人问你想去哪里吃饭，你最常出现的反应：',
        options: [
          { label: 'A', tag: 'STABLE', text: '说出一个你真正想吃的地方' },
          { label: 'B', tag: 'SOCIAL', text: '附和呼声最高的那个' },
          { label: 'C', tag: 'EMOTIONAL', text: '随便说一个，主要是不想让对方为难' },
          { label: 'D', tag: 'INNER', text: '真的答不上来，不是客气，是想不出来自己想要什么' }
        ]
      },
      {
        text: '你拒绝了一个邀请，对方沉默了一会儿。你接下来：',
        options: [
          { label: 'A', tag: 'STABLE', text: '觉得这是正常反应，等一等' },
          { label: 'B', tag: 'INNER', text: '开始怀疑自己的决定，明明刚才想拒绝，现在又不确定了' },
          { label: 'C', tag: 'EMOTIONAL', text: '发消息解释，怕他生气或觉得你不重视他' },
          { label: 'D', tag: 'SOCIAL', text: '如果群里没人回应你，会坐立难安' }
        ]
      },
      {
        text: '同事把不属于你的活推过来，说“你最靠谱”。你通常：',
        options: [
          { label: 'A', tag: 'STABLE', text: '当场说清楚这个不在你职责范围内' },
          { label: 'B', tag: 'INNER', text: '接下来了，事后才意识到这根本不是你的事' },
          { label: 'C', tag: 'EMOTIONAL', text: '不忍心让他失望，就接了' },
          { label: 'D', tag: 'SOCIAL', text: '如果当时组里其他人都在，更难直接拒绝' }
        ]
      },
      {
        text: '你在亲密关系里很少说「我不想」。如果深究，更像是：',
        options: [
          { label: 'A', tag: 'STABLE', text: '不是不说，你说得出来' },
          { label: 'B', tag: 'INNER', text: '到了那个时刻，你不太确定自己到底想不想' },
          { label: 'C', tag: 'EMOTIONAL', text: '说了怕对方情绪受影响，不划算' },
          { label: 'D', tag: 'SOCIAL', text: '两个人相处时你更倾向维持和气，不想成为破坏氛围的那个' }
        ]
      },
      {
        text: '家人叫你帮忙，你其实很累。你更可能：',
        options: [
          { label: 'A', tag: 'STABLE', text: '说你现在状态不好，等会再帮' },
          { label: 'B', tag: 'INNER', text: '站起来帮了，不确定是真的愿意还是习惯性反应' },
          { label: 'C', tag: 'EMOTIONAL', text: '即使很累，也不想让他们觉得你冷漠' },
          { label: 'D', tag: 'SOCIAL', text: '当着大家的面，更容易马上站起来' }
        ]
      },
      {
        text: '答应了某件事，后来发现自己根本不想做。这种情况：',
        options: [
          { label: 'A', tag: 'STABLE', text: '不太常发生，答应之前你会先想清楚' },
          { label: 'B', tag: 'INNER', text: '挺常见，答应的时候其实就没想清楚' },
          { label: 'C', tag: 'EMOTIONAL', text: '时常有，主要是当时没法让对方失望' },
          { label: 'D', tag: 'SOCIAL', text: '在多人场合更容易，事后一个人才反应过来' }
        ]
      },
      {
        text: '你正在休息，有人发消息说“你现在有空吗”。你通常：',
        options: [
          { label: 'A', tag: 'STABLE', text: '如果没空就说没空' },
          { label: 'B', tag: 'INNER', text: '说有空，然后心里有点不情愿' },
          { label: 'C', tag: 'EMOTIONAL', text: '说有空——怕对方等太久，或者觉得你在回避他' },
          { label: 'D', tag: 'SOCIAL', text: '看对方是谁，如果是群里的人，更容易直接说有空' }
        ]
      },
      {
        text: '最近一次感到「被自己委屈了」，根源更像是：',
        options: [
          { label: 'A', tag: 'STABLE', text: '没怎么有这种感觉' },
          { label: 'B', tag: 'EMOTIONAL', text: '当时照顾了别人的感受，没人注意到你' },
          { label: 'C', tag: 'SOCIAL', text: '在场合里说不出真实想法，回来才憋屈' },
          { label: 'D', tag: 'INNER', text: '也有一部分是你当时不知道自己要什么，后来才清楚' }
        ]
      }
    ];

    const results = {
      STABLE: {
        title: 'STABLE — 边界感比较稳固',
        quote: '你知道自己想要什么，也说得出来。这件事比听起来难得多。',
        body: [
          '你在关系里的状态比较稳。当有人要求你做不想做的事，你能感知到那个“不想”，而且通常能说出来——不一定每次都完美，但你不会长期压着它。',
          '你不太容易被别人的情绪卷走，也不会因为群体氛围就失去自己的判断。当然你也有照顾别人感受的时候，但那是你选择的，不是被推着的。',
          '边界感不是冷漠，也不是对抗。你已经在用一种比较自然的方式运转——知道自己的边，也能让别人知道。'
        ],
        mode: '你的自我感知比较清晰——大多数情况下，你知道自己想要什么，不想要什么。这是很多人要花很长时间才能找回来的东西。',
        daily: [
          '你能在「需要拒绝」的时刻感受到那个需要，而且通常能把它说出来。不是每次都顺畅，但你不会把它长期憋在心里。',
          '你有时候也会为别人让步——但那是你评估过之后做的选择，不是在对方开口之前就已经放弃了自己。'
        ],
        reflect: '你是怎么练出来的——还是本来就这样？'
      },
      EMOTIONAL: {
        title: 'EMOTIONAL — 情感型边界缺失',
        quote: '你替别人背了太多情绪的重量，久了之后，你以为那些都是自己的。',
        body: [
          '别人的情绪，你总是第一个感觉到。一个人走进房间，带着低落或焦虑，你的身体就已经接收到了。',
          '你习惯了这种状态，甚至把它当作“关心别人”的方式。但你有没有注意到，在人群中待久了，你会格外疲惫？那种疲惫是情绪的边界被打开太久。',
          '你的共情能力是真实的天赋。但没有边界的共情，最终会把你自己淹没。'
        ],
        mode: '你的共情是真实的——别人的情绪在你这里不只是信号，是会进来待着的东西。问题是，进来之后你很难把它们送走，慢慢就分不清哪些是你的，哪些是他们的。',
        daily: [
          '和情绪起伏大的人相处之后，你会比他们更累。那种疲惫不是心疼，是被拉进去了。',
          '你可能经常在关系里先感受到对方的不安，然后开始想自己是不是做了什么——即使什么都没发生。'
        ],
        reflect: '现在，你正在替谁扛着什么？'
      },
      SOCIAL: {
        title: 'SOCIAL — 社交型边界缺失',
        quote: '那句「好吧」说出口之前，你的需要已经被你自己押下去了。',
        body: [
          '在一群人里，你的雷达一直在扫描：气氛还好吗？有人不开心吗？你是那个默默维护氛围的人。',
          '说“不”对你来说，比大多数人想象的要难。你会在拒绝之前先感受到对方可能的失望，然后在那个失望还没发生的时候，就已经妥协了。',
          '久了以后你会发现，你在人群里很受欢迎，却有一种隐隐的孤独。因为大家认识的那个你，是调整过的版本。'
        ],
        mode: '你的雷达一直在扫描——气氛好吗？有人不舒服吗？你是那个默默维护氛围的人。说「不」之前，你已经感受到对方的失望，然后在那个失望还没发生之前，你就妥协了。',
        daily: [
          '在一群人里你很受欢迎，但有一种隐隐的孤独——大家认识的那个你，是调整过的版本。',
          '你在人群里花了很多能量去管理别人的感受，回到一个人的时候，会格外想要安静。'
        ],
        reflect: '你上一次说出「我不想」，是什么时候？'
      },
      INNER: {
        title: 'INNER — 自我认知型边界缺失',
        quote: '如果有人问你「你想要什么」，你可能需要想很久。',
        body: [
          '如果有人问你“你想要什么”，你可能需要想很久。你在很多关系和场景里，更习惯去适应、去配合、去回应别人的需求。时间久了，你对自己的偏好、底线、甚至喜恶，都变得有些模糊。',
          '你可能在别人的故事里很清醒，一眼就能看到对方需要什么。但回到自己身上，画面就变得模糊了。',
          '找回自己的边界，可以从最小的事情开始。今天想吃什么，想穿什么，想不想出门。'
        ],
        mode: '你对外部的需求很清醒——别人需要什么你一眼就看到了。但回到自己身上，画面就模糊了。你对自己的偏好、底线、喜恶，慢慢都变得不那么确定。',
        daily: [
          '有人问你想去哪里吃、想看什么电影，你的第一反应是：你们决定就好。这个「随便」里，有时候是真的随便，有时候是你已经不知道自己想要什么了。',
          '你可能很善于配合别人的节奏，但到最后有时候连自己想要什么节奏，都需要想一会儿。'
        ],
        reflect: '今天，你有没有为自己做一个只考虑自己的决定？'
      }
    };

    const priority = ['STABLE', 'EMOTIONAL', 'SOCIAL', 'INNER'];
    const state = {
      current: 0,
      answers: Array(questions.length).fill(null)
    };

    const progressEl = document.getElementById('progress');
    const questionTextEl = document.getElementById('questionText');
    const optionsEl = document.getElementById('options');
    const nextBtn = document.getElementById('nextBtn');
    const quizView = document.getElementById('quizView');
    const resultView = document.getElementById('resultView');

    function renderQuestion() {
      const question = questions[state.current];
      const selected = state.answers[state.current];
      progressEl.textContent = `${state.current + 1} / ${questions.length}`;
      questionTextEl.textContent = question.text;
      optionsEl.innerHTML = '';

      question.options.forEach((option, index) => {
        const button = document.createElement('button');
        button.className = 'option';
        button.type = 'button';
        if (selected === index) button.classList.add('selected');
        button.innerHTML = `<span class="option-label">${option.label}.</span>${option.text}`;
        button.addEventListener('click', () => {
          state.answers[state.current] = index;
          renderQuestion();
        });
        optionsEl.appendChild(button);
      });

      nextBtn.disabled = selected === null;
      nextBtn.textContent = state.current === questions.length - 1 ? '查看结果' : '下一题';
    }

    function getResultTag() {
      const counts = { STABLE: 0, EMOTIONAL: 0, SOCIAL: 0, INNER: 0 };
      state.answers.forEach((answerIndex, questionIndex) => {
        const tag = questions[questionIndex].options[answerIndex].tag;
        counts[tag] += 1;
      });

      return priority.reduce((best, current) => {
        if (counts[current] > counts[best]) return current;
        return best;
      }, priority[0]);
    }

    const typeNameMap = {
      STABLE: '边界感比较稳固',
      EMOTIONAL: '情感型边界缺失',
      SOCIAL: '社交型边界缺失',
      INNER: '自我认知型边界缺失'
    };

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function removeExistingExportNode(id) {
      const existing = document.getElementById(id);
      if (existing) existing.remove();
    }

    function showShareModal(dataUrl, fileName) {
      removeExistingExportNode('__share-preview-modal__');
      const modal = document.createElement('div');
      modal.id = '__share-preview-modal__';
      modal.className = 'share-preview-modal';
      modal.innerHTML = `
        <div class="share-preview-dialog">
          <button class="share-preview-close" type="button" aria-label="关闭">×</button>
          <img class="share-preview-image" src="${dataUrl}" alt="分享预览" />
          <p class="share-preview-tip">长按保存</p>
          <a class="share-preview-save" href="${dataUrl}" download="${fileName}">保存图片</a>
        </div>
      `;
      modal.addEventListener('click', (event) => {
        if (event.target === modal) modal.remove();
      });
      modal.querySelector('.share-preview-close').addEventListener('click', () => {
        modal.remove();
      });
      document.body.appendChild(modal);
    }

    async function captureNode(node, options = {}) {
      const canvas = await html2canvas(node, {
        backgroundColor: options.backgroundColor || '#f5f0eb',
        width: options.width || node.offsetWidth,
        height: options.height || node.offsetHeight,
        scale: Math.min(window.devicePixelRatio * 2, 4),
        useCORS: true,
        logging: false,
        windowWidth: options.windowWidth || options.width || node.offsetWidth
      });
      return canvas.toDataURL('image/png');
    }

    async function generateLongImage() {
      const source = document.getElementById('result-capture');
      if (!source) return;

      removeExistingExportNode('__boundary-long-wrapper__');
      const wrapper = document.createElement('div');
      wrapper.id = '__boundary-long-wrapper__';
      wrapper.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:390px;background:#f5f0eb;color:#333;font-family:"Noto Serif SC", Georgia, serif;';

      const clonedContent = source.cloneNode(true);
      clonedContent.style.cssText = 'padding:0 28px 8px;';

      wrapper.innerHTML = `
        <div style="padding:28px 28px 16px;color:#4A3073;">
          <div style="display:flex;align-items:baseline;gap:8px;">
            <span style="font-size:15px;font-weight:600;line-height:1;">女也</span>
            <span style="font-size:12px;line-height:1;">she is ______.</span>
          </div>
          <div style="margin-top:16px;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;">边界感测评</div>
          <div style="height:1px;background:rgba(74,48,115,0.15);margin-top:10px;"></div>
        </div>
      `;

      wrapper.appendChild(clonedContent);

      const footer = document.createElement('div');
      footer.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:16px 28px 28px;position:relative;';
      footer.innerHTML = `
        <div style="position:absolute;top:0;left:28px;right:28px;height:1px;background:rgba(74,48,115,0.12);"></div>
        <span style="font-family:Courier New,monospace;font-size:9px;color:#9d948d;">she-is-app.netlify.app</span>
        <span style="font-family:Courier New,monospace;font-size:12px;color:#4A3073;">she is ______.</span>
      `;
      wrapper.appendChild(footer);
      document.body.appendChild(wrapper);

      try {
        const dataUrl = await captureNode(wrapper, { width: 390, backgroundColor: '#f5f0eb', windowWidth: 390 });
        showShareModal(dataUrl, 'boundary-long.png');
      } finally {
        wrapper.remove();
      }
    }

    async function generateQuoteCard() {
      removeExistingExportNode('__boundary-quote-card__');
      const card = document.createElement('div');
      card.id = '__boundary-quote-card__';
      card.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:390px;height:693px;padding:44px 34px;background:#f5f0eb;color:#2f2640;font-family:"Noto Serif SC", Georgia, serif;overflow:hidden;';

      card.innerHTML = `
        <div style="position:absolute;top:-72px;left:-62px;width:240px;height:240px;background:radial-gradient(circle, rgba(160,133,214,0.18) 0%, rgba(160,133,214,0) 72%);"></div>
        <div style="position:absolute;right:-72px;bottom:-70px;width:240px;height:240px;background:radial-gradient(circle, rgba(160,133,214,0.16) 0%, rgba(160,133,214,0) 72%);"></div>
        <div style="position:relative;z-index:1;height:100%;display:flex;flex-direction:column;">
          <div>
            <div style="font-size:12px;color:#4A3073;letter-spacing:0.16em;text-transform:uppercase;">边界感测评</div>
            <div style="height:1px;background:rgba(74,48,115,0.15);margin-top:12px;"></div>
          </div>
          <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
            <div style="font-size:34px;line-height:1.35;color:#4A3073;font-weight:600;">${escapeHtml(window._currentTypeName || '边界感比较稳固')}</div>
            <div style="margin-top:18px;font-size:18px;line-height:1.9;color:#5b5167;font-style:italic;">${escapeHtml(window._currentQuote || '')}</div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:flex-end;">
            <span style="font-family:Courier New,monospace;font-size:9px;color:#9d948d;">she-is-app.netlify.app</span>
            <span style="font-family:Courier New,monospace;font-size:12px;color:#4A3073;">she is ______.</span>
          </div>
        </div>
      `;

      document.body.appendChild(card);
      try {
        const dataUrl = await captureNode(card, { width: 390, height: 693, backgroundColor: '#f5f0eb', windowWidth: 390 });
        showShareModal(dataUrl, 'boundary-quote.png');
      } finally {
        card.remove();
      }
    }

    async function handleShare(event) {
      const button = event.currentTarget;
      const mode = button.dataset.share;
      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = '生成中…';
      try {
        if (mode === 'image') {
          await generateLongImage();
        } else {
          await generateQuoteCard();
        }
      } catch (error) {
        console.error('分享图片生成失败', error);
        alert('生成图片失败，请重试');
      } finally {
        button.disabled = false;
        button.textContent = originalText;
      }
    }

    function renderResult() {
      const tag = getResultTag();
      const result = results[tag];
      window._currentQuote = result.quote;
      window._currentTypeName = typeNameMap[tag] || result.title;
      resultView.innerHTML = `
        <div class="result-brand">
          <div class="result-brand-lockup">
            <span class="result-brand-cn">女也</span>
            <span class="result-brand-en">she is ______.</span>
          </div>
        </div>
        <div class="eyebrow">YOUR RESULT</div>
        <div id="result-capture">
          <h2 class="result-title">${result.title}</h2>
          <div class="quote">${result.quote}</div>
          <div class="body-copy">
            ${result.body.map(item => `<p>${item}</p>`).join('')}
          </div>
          <section class="section">
            <h3 class="section-title">你的边界模式</h3>
            <div class="section-content"><p>${result.mode}</p></div>
          </section>
          <section class="section">
            <h3 class="section-title">在日常里</h3>
            <ul class="list">
              ${result.daily.map(item => `<li>${item}</li>`).join('')}
            </ul>
          </section>
          <section class="section">
            <h3 class="section-title">值得想一想</h3>
            <div class="section-content"><p>${result.reflect}</p></div>
          </section>
        </div>
        <div class="share-actions">
          <button class="share-btn" type="button" data-share="image">结果长图</button>
          <button class="share-btn" type="button" data-share="quote">分享金句</button>
        </div>
        <button class="btn secondary result-restart" id="restartBtn">再做一次</button>
      `;

      quizView.classList.add('hidden');
      resultView.classList.remove('hidden');
      document.getElementById('restartBtn').addEventListener('click', resetQuiz);
      resultView.querySelectorAll('.share-btn').forEach(button => {
        button.addEventListener('click', handleShare);
      });
    }

    function resetQuiz() {
      state.current = 0;
      state.answers = Array(questions.length).fill(null);
      resultView.classList.add('hidden');
      quizView.classList.remove('hidden');
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    nextBtn.addEventListener('click', () => {
      if (state.answers[state.current] === null) return;
      if (state.current === questions.length - 1) {
        renderResult();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      state.current += 1;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    renderQuestion();
  </script>
</body>
</html>
