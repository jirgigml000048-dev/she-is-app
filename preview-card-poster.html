<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boundary Result Card Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f6f2ee 0%, #ebe3dc 100%);
      font-family: "Noto Serif SC", serif;
    }
    .stage {
      min-height: 100vh;
      width: 100%;
      display: grid;
      place-items: center;
      padding: 32px;
    }
    .card {
      position: relative;
      width: 390px;
      height: 693px;
      background: #f5f0eb;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 48px 36px;
      font-family: "Noto Serif SC", serif;
      box-sizing: border-box;
      box-shadow: 0 24px 60px rgba(74, 48, 115, 0.16);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="card" id="result-card">
      <div style="position:absolute;top:-60px;left:-60px;width:280px;height:280px;background:radial-gradient(ellipse,rgba(74,48,115,0.13),transparent 70%);pointer-events:none;"></div>
      <div style="position:absolute;bottom:-60px;right:-60px;width:280px;height:280px;background:radial-gradient(ellipse,rgba(74,48,115,0.10),transparent 70%);pointer-events:none;"></div>
      
      <div style="position:relative;z-index:1;">
        <div style="font-size:12px;color:#4A3073;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:12px;">边界感测评 · Boundary Sense</div>
        <div style="height:1px;background:rgba(74,48,115,0.15);margin-bottom:28px;"></div>
      </div>
      
      <div style="flex:1;"></div>
      
      <div style="position:relative;z-index:1;">
        <div style="font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:600;color:#4A3073;line-height:1.1;margin-bottom:10px;">SOCIAL</div>
        <div style="font-family:'Noto Serif SC',serif;font-size:18px;color:#2e2e2e;line-height:1.5;margin-bottom:20px;">你更容易在群体氛围里退让</div>
        <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:#888;line-height:1.7;margin-bottom:16px;">你的界线不是不存在，是习惯了在别人开口之前就让步。</div>
      </div>
      
      <div style="flex:1;"></div>
      
      <div style="display:flex;justify-content:space-between;align-items:flex-end;position:relative;z-index:1;">
        <span style="font-family:'Courier New',monospace;font-size:9px;color:#bbb;">she-is-app.netlify.app</span>
        <span style="font-family:'Courier New',monospace;font-size:12px;color:#4A3073;letter-spacing:0.05em;">she is ______.</span>
      </div>
    </div>
  </div>
</body>
</html>
