<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #FAF7F4;
        background-image: radial-gradient(ellipse 90% 75% at 0% 0%, rgba(232,121,160,0.18) 0%, transparent 60%),
          radial-gradient(ellipse 80% 70% at 100% 5%, rgba(167,139,250,0.2) 0%, transparent 55%),
          radial-gradient(ellipse 70% 80% at 0% 100%, rgba(96,165,250,0.15) 0%, transparent 55%),
          radial-gradient(ellipse 75% 60% at 100% 90%, rgba(249,115,22,0.12) 0%, transparent 50%);
  min-height: 100vh;
  padding: 40px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}
h2 {
  font-family: "Lora", serif;
  font-size: 13px;
  letter-spacing: 0.15em;
  color: #888;
  text-transform: uppercase;
  text-align: center;
}
.section { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; }
.card {
  background: rgba(255,255,255,0.7);
  border-radius: 16px;
  padding: 28px 24px;
  border: 1px solid rgba(44,32,20,0.08);
}
.label {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #4A3073;
  margin-bottom: 14px;
  font-family: "DM Sans", sans-serif;
}
.serif-title { font-family: "Lora", serif; font-size: 28px; color: #2e2e2e; line-height: 1.3; margin-bottom: 10px; }
.serif-body { font-family: "Noto Serif SC", serif; font-size: 14px; color: #555; line-height: 1.8; }
.serif-tag { display: inline-block; font-family: "Noto Serif SC", serif; font-size: 11px; color: #4A3073; background: rgba(74,48,115,0.08); padding: 4px 10px; border-radius: 20px; margin-top: 12px; margin-right: 6px; }
.sans-title { font-family: "DM Sans", sans-serif; font-weight: 400; font-size: 26px; color: #2e2e2e; line-height: 1.3; margin-bottom: 10px; }
.sans-body { font-family: "DM Sans", sans-serif; font-weight: 300; font-size: 14px; color: #555; line-height: 1.8; }
.sans-tag { display: inline-block; font-family: "DM Sans", sans-serif; font-size: 11px; font-weight: 400; color: #4A3073; background: rgba(74,48,115,0.08); padding: 4px 10px; border-radius: 20px; margin-top: 12px; margin-right: 6px; }
.mix-title { font-family: "Lora", serif; font-size: 28px; color: #2e2e2e; line-height: 1.3; margin-bottom: 10px; }
.mix-body { font-family: "DM Sans", sans-serif; font-weight: 300; font-size: 14px; color: #555; line-height: 1.8; }
.mix-tag { display: inline-block; font-family: "DM Sans", sans-serif; font-size: 11px; color: #4A3073; background: rgba(74,48,115,0.08); padding: 4px 10px; border-radius: 20px; margin-top: 12px; margin-right: 6px; }
.divider { width: 32px; height: 1px; background: rgba(74,48,115,0.2); margin: 0 auto; }
</style>
</head>
<body>
<h2>she is — 字体方案对比</h2>
<div class="section">
  <div class="card">
    <div class="label">A · 全衬线（品牌规范）</div>
    <div class="serif-title">她感受到了，<br>但她没有说出来。</div>
    <div class="serif-body">高敏感不是脆弱，是你的感知系统一直在超额运转。这份测评帮你看清楚那些说不清楚的感受。</div>
    <div><span class="serif-tag">#感受力很强</span><span class="serif-tag">#害怕被丢下</span></div>
  </div>
  <div class="divider"></div>
  <div class="card">
    <div class="label">B · 全 DM Sans</div>
    <div class="sans-title">她感受到了，<br>但她没有说出来。</div>
    <div class="sans-body">高敏感不是脆弱，是你的感知系统一直在超额运转。这份测评帮你看清楚那些说不清楚的感受。</div>
    <div><span class="sans-tag">#感受力很强</span><span class="sans-tag">#害怕被丢下</span></div>
  </div>
  <div class="divider"></div>
  <div class="card">
    <div class="label">C · 混排（标题衬线 + 正文 DM Sans）</div>
    <div class="mix-title">她感受到了，<br>但她没有说出来。</div>
    <div class="mix-body">高敏感不是脆弱，是你的感知系统一直在超额运转。这份测评帮你看清楚那些说不清楚的感受。</div>
    <div><span class="mix-tag">#感受力很强</span><span class="mix-tag">#害怕被丢下</span></div>
  </div>
</div>
</body>
</html>
