<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>来信 | 女也 She Is</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/font-override.css" />
    <style>
      :root {
        --bg: #f5f0eb;
        --surface: rgba(255, 255, 255, 0.58);
        --surface-border: rgba(74, 48, 115, 0.14);
        --ink: #2f2538;
        --body: rgba(47, 37, 56, 0.8);
        --muted: rgba(74, 48, 115, 0.52);
        --accent: #4A3073;
        --accent-soft: rgba(74, 48, 115, 0.08);
        --shadow: 0 24px 60px rgba(74, 48, 115, 0.08);
        --radius: 28px;
      }

      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--body);
        font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", "SimSun", serif;
      }

      body {
        position: relative;
        overflow-x: hidden;
      }

      .vi-glow {
        position: fixed;
        pointer-events: none;
        z-index: 0;
        border-radius: 50%;
        filter: blur(90px);
      }

      .vi-glow--top {
        width: 360px;
        height: 360px;
        top: -130px;
        right: -100px;
        background: radial-gradient(ellipse, rgba(74, 48, 115, 0.1), transparent 70%);
      }

      .vi-glow--bottom {
        width: 320px;
        height: 320px;
        bottom: -90px;
        left: -80px;
        background: radial-gradient(ellipse, rgba(74, 48, 115, 0.08), transparent 70%);
      }

      .page {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        padding: 0 24px 48px;
      }

      .header {
        padding: 14px 0 2px;
      }

      .logo {
        margin: 0;
      }

      .logo-cn {
        display: block;
        font-family: "Cormorant Garamond", serif;
        font-size: 28px;
        line-height: 1;
        font-weight: 600;
        color: #1c1c1c;
        letter-spacing: 0.12em;
      }

      .logo-en {
        display: block;
        font-family: 'Courier Prime', monospace;
        font-size: 11px;
        color: #888;
        letter-spacing: 0.08em;
        margin-top: 2px;
        text-align: right;
      }

      .header-rule {
        height: 1px;
        margin: 0 0 54px;
        background: linear-gradient(to right, transparent, rgba(74,48,115,0.5) 25%, rgba(74,48,115,0.5) 75%, transparent);
        border: none;
      }

      .back {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        margin-bottom: 18px;
        color: var(--accent);
        text-decoration: none;
        font-size: 14px;
        letter-spacing: 0.04em;
      }

      .page-pretitle {
        margin: 0 0 10px;
        font-size: 12px;
        line-height: 1.4;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .title {
        margin: 0;
        font-family: "Cormorant Garamond", "Noto Serif SC", serif;
        font-size: clamp(42px, 9vw, 58px);
        line-height: 0.98;
        font-weight: 500;
        letter-spacing: 0.08em;
        color: var(--accent);
      }

      .intro {
        max-width: 28em;
        margin: 18px 0 0;
        font-size: 15px;
        line-height: 2;
        color: var(--body);
      }

      .intro-note {
        display: block;
        margin-top: 12px;
        font-size: 13px;
        color: var(--muted);
      }

      .form-shell {
        margin-top: 46px;
        padding: 34px 24px 28px;
        border: 1px solid var(--surface-border);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .form-caption {
        margin: 0 0 26px;
        font-family: "Cormorant Garamond", serif;
        font-size: 24px;
        letter-spacing: 0.08em;
        color: var(--ink);
      }

      .letter-form {
        display: grid;
        gap: 22px;
      }

      .field {
        display: grid;
        gap: 10px;
      }

      .field label {
        font-size: 13px;
        letter-spacing: 0.08em;
        color: var(--accent);
      }

      .field small {
        font-size: 12px;
        line-height: 1.7;
        color: var(--muted);
      }

      .field input,
      .field textarea {
        width: 100%;
        border: none;
        border-bottom: 1px solid rgba(74, 48, 115, 0.24);
        border-radius: 0;
        padding: 0 0 12px;
        background: transparent;
        color: var(--ink);
        font: inherit;
        font-size: 15px;
        line-height: 1.9;
        outline: none;
        transition: border-color 0.24s ease, transform 0.24s ease;
      }

      .field input::placeholder,
      .field textarea::placeholder {
        color: rgba(74, 48, 115, 0.36);
      }

      .field input:focus,
      .field textarea:focus {
        border-color: var(--accent);
        transform: translateY(-1px);
      }

      .field textarea {
        min-height: 160px;
        resize: vertical;
      }

      .form-actions {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
        padding-top: 8px;
      }

      .submit-btn {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 999px;
        padding: 13px 26px;
        background: var(--accent);
        color: #f5f0eb;
        font: inherit;
        font-size: 14px;
        letter-spacing: 0.12em;
        cursor: pointer;
        transition: transform 0.24s ease, box-shadow 0.24s ease, opacity 0.24s ease;
        box-shadow: 0 14px 30px rgba(74, 48, 115, 0.18);
      }

      .submit-btn:hover,
      .submit-btn:focus-visible {
        transform: translateY(-1px);
        opacity: 0.92;
      }

      .submit-btn:disabled {
        cursor: wait;
        opacity: 0.7;
        transform: none;
      }

      .form-status {
        min-height: 24px;
        margin: 0;
        font-size: 13px;
        line-height: 1.8;
        color: var(--muted);
      }

      .form-status.is-success {
        color: var(--accent);
      }

      .form-status.is-error {
        color: #8a4b5d;
      }

      @media (max-width: 520px) {
        .page {
          padding: 0 24px 40px;
        }

        .header-rule {
          margin-bottom: 42px;
        }

        .form-shell {
          padding: 28px 20px 24px;
          border-radius: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="vi-glow vi-glow--top" aria-hidden="true"></div>
    <div class="vi-glow vi-glow--bottom" aria-hidden="true"></div>

    <main class="page">
      <header class="header">
        <div class="logo">
          <span class="logo-cn">女也</span>
          <span class="logo-en">she is ______.</span>
        </div>
      </header>
      <div class="header-rule"></div>
      <a class="back" href="index.html">← 返回首页</a>

      <p class="page-pretitle">Letters</p>
      <h1 class="title">来信</h1>
      <p class="intro">
        如果你想说点什么，这里留给你。可以只是一个片刻、一句迟来的话、一次没有说完的心情。
        <span class="intro-note">如希望收到回复，可在下方留下联系方式。</span>
      </p>

      <section class="form-shell" aria-labelledby="letter-form-title">
        <h2 class="form-caption" id="letter-form-title">Write to She Is</h2>

        <form
          class="letter-form"
          id="letterForm"
          action="https://formspree.io/f/xnjglekz"
          method="POST"
        >
          <div class="field">
            <label for="senderName">称呼</label>
            <input
              id="senderName"
              name="称呼"
              type="text"
              autocomplete="name"
              placeholder="你想被如何称呼"
            />
          </div>

          <div class="field">
            <label for="letterContent">内容</label>
            <textarea
              id="letterContent"
              name="内容"
              required
              placeholder="把你想说的话写在这里。"
            ></textarea>
          </div>

          <div class="field">
            <label for="contactInfo">联系方式</label>
            <input
              id="contactInfo"
              name="联系方式"
              type="text"
              inputmode="email"
              autocomplete="email"
              placeholder="邮箱 / 微信 / 其他联系方式"
            />
            <small>选填，如需回复请留下。</small>
          </div>

          <div class="form-actions">
            <button class="submit-btn" type="submit">提交来信</button>
            <p class="form-status" id="formStatus" aria-live="polite"></p>
          </div>
        </form>
      </section>
    </main>

    <script>
      (function() {
        const form = document.getElementById('letterForm');
        const status = document.getElementById('formStatus');
        const submitButton = form.querySelector('button[type="submit"]');
        const defaultButtonText = submitButton.textContent;

        function setStatus(message, type) {
          status.textContent = message;
          status.className = 'form-status' + (type ? ' is-' + type : '');
        }

        form.addEventListener('submit', async function(event) {
          event.preventDefault();
          submitButton.disabled = true;
          submitButton.textContent = '提交中...';
          setStatus('正在寄出你的来信。');

          try {
            const response = await fetch(form.action, {
              method: 'POST',
              body: new FormData(form),
              headers: {
                Accept: 'application/json'
              }
            });

            if (!response.ok) {
              throw new Error('submit_failed');
            }

            form.reset();
            setStatus('谢谢你的来信，已经收到。', 'success');
          } catch (error) {
            setStatus('提交失败，请稍后再试，或检查 Formspree 表单 ID 是否已替换。', 'error');
          } finally {
            submitButton.disabled = false;
            submitButton.textContent = defaultButtonText;
          }
        });
      })();
    </script>
  </body>
</html>
