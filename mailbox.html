<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>来信 | 女也 She Is</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<style>
      :root {
        --bg: #f7f3ee;
        --ink: #2e2e2e;
        --body: #555;
        --muted: #888;
        --shadow: 0 4px 20px rgba(44, 32, 20, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--body);
        font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", "SimSun", serif;
      }
      .page {
        max-width: 480px;
        margin: 0 auto;
        padding: 22px 20px 28px;
      }
      .back {
        display: inline-block;
        text-decoration: none;
        color: var(--body);
        font-size: 14px;
        margin-bottom: 12px;
      }
      .logo {
        margin: 0;
        font-family: "Cormorant Garamond", serif;
        font-size: 28px;
        font-weight: 600;
        line-height: 1;
        color: #1c1c1c;
        letter-spacing: 0.12em;
      }
      .tagline {
        margin: 6px 0 24px;
        font-family: "Courier Prime", monospace;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.06em;
      }
      .page-pretitle {
        margin: 0 0 4px;
        font-family: "Courier Prime", monospace;
        font-size: 12px;
        line-height: 1.4;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .title {
        margin: 0;
        margin-top: 0;
        font-family: "Noto Serif SC", "Cormorant Garamond", "Source Han Serif SC", serif;
        font-size: 36px;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: 0.12em;
      }
      .mail {
        margin: 16px auto 10px;
        width: fit-content;
        border: 1px solid #ccc;
        background: #faf0e6;
        padding: 16px 20px;
        font-family: "Courier Prime", monospace;
        font-size: 18px;
        letter-spacing: 0.06em;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.7);
        color: var(--ink);
      }
      .intro {
        margin: 8px 0 16px;
        text-align: center;
        color: var(--body);
        font-size: 14px;
      }
      .letters {
        background: #fff;
        border-radius: 16px;
        box-shadow: var(--shadow);
        padding: 0 24px;
      }
      .letter {
        padding: 18px 0 18px 10px;
        border-left: 3px solid #f2a98a;
      }
      .letter + .letter {
        border-top: 1px solid #ececec;
      }
      .date {
        font-size: 12px;
        color: var(--muted);
      }
      .opening {
        margin: 10px 0 10px;
        padding-left: 10px;
        font-family: "Cormorant Garamond", serif;
        font-size: 18px;
        font-style: italic;
        line-height: 1.45;
        color: var(--ink);
        letter-spacing: 0.12em;
      }
      .reply {
        margin: 0;
        font-size: 15px;
        line-height: 1.6;
        color: var(--body);
      }
          .vi-glow {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            border-radius: 50%;
            filter: blur(80px);
          }
          .vi-glow--top {
            width: 340px;
            height: 340px;
            top: -100px;
            right: -80px;
            background: radial-gradient(ellipse, rgba(74,48,115,0.07), transparent 70%);
          }
          .vi-glow--bottom {
            width: 280px;
            height: 280px;
            bottom: -60px;
            left: -60px;
            background: radial-gradient(ellipse, rgba(74,48,115,0.05), transparent 70%);
          }
        </style>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/font-override.css" />
</head>
  <body>
    <div class="vi-glow vi-glow--top" aria-hidden="true"></div>
    <div class="vi-glow vi-glow--bottom" aria-hidden="true"></div>
    <main class="page">
      <div class="topbar" style="display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:24px;">
        <a class="back" href="index.html" style="display:inline-flex;align-items:center;min-height:44px;padding:0 14px;border:1px solid rgba(74,48,115,0.12);border-radius:999px;background:rgba(255,255,255,.56);color:#4A3073;">← 返回首页</a>
        <div style="margin-left:auto;text-align:right;">
          <h2 class="logo" style="color:#4A3073;letter-spacing:0.16em;">她sheis</h2>
          <p class="tagline" style="margin-top:6px;letter-spacing:0.14em;text-transform:uppercase;">she is ______.</p>
        </div>
      </div>

      <p class="page-pretitle">LETTERS</p>
      <h1 class="title">来信</h1>
      <div class="mail">letters@sheis.cn</div>
      <p class="intro">有话想说，这里有人在听。</p>

      <section class="letters"></section>
    </main>
  </body>
</html>
