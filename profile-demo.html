<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Demo</title>
  <style>
    :root {
      --bg: #f5f0eb;
      --surface: rgba(255,255,255,0.72);
      --surface-strong: rgba(255,255,255,0.84);
      --brand: #4A3073;
      --brand-light: #a98fcf;
      --text: #2d2238;
      --muted: #766c82;
      --line: rgba(74, 48, 115, 0.14);
      --placeholder: #b8b2bd;
      --placeholder-bg: rgba(117, 108, 130, 0.06);
      --radius: 24px;
      --shadow: 0 16px 42px rgba(74, 48, 115, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Serif SC", Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 100%;
      max-width: 390px;
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    .intro {
      position: relative;
      padding: 42px 18px 34px;
      margin-bottom: 24px;
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 12%, rgba(169, 143, 207, 0.22), rgba(169, 143, 207, 0) 52%),
        linear-gradient(180deg, rgba(255,255,255,0.68), rgba(255,255,255,0.42));
      border: 1px solid rgba(74, 48, 115, 0.08);
      box-shadow: 0 18px 40px rgba(74, 48, 115, 0.05);
      text-align: center;
    }

    .intro::after {
      content: "";
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: -12px;
      height: 1px;
      background: linear-gradient(90deg, rgba(74,48,115,0), rgba(74,48,115,0.28), rgba(74,48,115,0));
    }

    .intro-mark {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(74, 48, 115, 0.74);
      margin-bottom: 16px;
    }

    .intro-lead {
      margin: 0;
      font-size: 20px;
      line-height: 1.5;
      color: var(--brand);
      letter-spacing: 0.02em;
    }

    .intro-sub,
    .intro-end {
      margin: 10px 0 0;
      font-size: 13px;
      line-height: 1.9;
      text-align: center;
    }

    .intro-sub {
      color: #666;
      letter-spacing: 0.08em;
    }

    .intro-end {
      color: #999;
      font-style: italic;
      letter-spacing: 0.03em;
    }

    .radar-wrap {
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 18px 16px 12px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    #radarCanvas {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    .accordion-group {
      display: grid;
      gap: 12px;
    }

    .accordion {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface);
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(74, 48, 115, 0.04);
      backdrop-filter: blur(8px);
    }

    .accordion.placeholder {
      background: rgba(255,255,255,0.52);
    }

    .accordion summary {
      list-style: none;
      cursor: pointer;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .accordion summary::-webkit-details-marker { display: none; }

    .accordion-summary-main {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      flex: 1;
    }

    .accordion-accent {
      width: 3px;
      align-self: stretch;
      min-height: 46px;
      border-radius: 999px;
      background: var(--brand);
      flex: 0 0 3px;
    }

    .accordion.placeholder .accordion-accent {
      background: rgba(74, 48, 115, 0.3);
    }

    .accordion-title-block {
      min-width: 0;
    }

    .accordion-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      color: var(--brand);
      font-weight: 600;
    }

    .accordion-subtitle {
      margin: 4px 0 0;
      font-size: 12px;
      color: #888;
      line-height: 1.4;
    }

    .accordion-toggle {
      color: var(--muted);
      font-size: 13px;
      flex-shrink: 0;
    }

    .accordion[open] summary {
      border-bottom: 1px solid var(--line);
    }

    .accordion-body {
      padding: 16px 18px 18px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .result-chip {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      width: 100%;
      padding: 12px 13px;
      border-radius: 16px;
      border: 1px solid rgba(74, 48, 115, 0.12);
      background: rgba(74, 48, 115, 0.06);
      color: var(--brand);
      text-decoration: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .result-chip:visited { color: var(--brand); }

    .result-chip.is-link {
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .result-chip.is-link:hover {
      transform: translateY(-1px);
      background: rgba(74, 48, 115, 0.1);
      box-shadow: 0 8px 18px rgba(74, 48, 115, 0.08);
    }

    .result-chip.is-link:active {
      transform: translateY(0);
    }

    .result-chip.is-placeholder {
      background: var(--placeholder-bg);
      border-style: dashed;
      border-color: rgba(117,108,130,0.28);
      color: var(--placeholder);
      cursor: default;
      pointer-events: none;
    }

    .chip-label {
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.76;
    }

    .chip-value {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
    }

    .result-chip.is-placeholder .chip-value {
      color: var(--muted);
    }

    @media (max-width: 360px) {
      .intro-lead { font-size: 19px; }
      .result-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="intro">
      <div class="intro-mark">Profile · Four Axes</div>
      <p class="intro-lead">你不是一个单一的类型。</p>
      <p class="intro-sub">你是谁，你为什么这样，你怎么感受，你怎么行动——</p>
      <p class="intro-end">这四个维度加在一起，才接近真实的你。</p>
    </section>

    <section class="panel active" data-panel="b">
      <div class="radar-wrap">
        <canvas id="radarCanvas" width="320" height="270" aria-label="四轴雷达图"></canvas>
        <div class="legend">
          <div>特质</div>
          <div>情绪</div>
          <div>行为</div>
          <div>动机</div>
        </div>
      </div>
      <div class="accordion-group" id="schemeB"></div>
    </section>
  </div>

  <script>
    const axes = [
      {
        key: 'trait',
        name: '特质轴',
        meaning: '你是谁',
        short: '特质',
        status: 'ready',
        score: 86,
        items: [
          { id: 'cognitive', label: 'cognitive', value: 'INFJ · Fe-Ni-Se-Ti', href: 'test-cognitive.html' }
        ]
      },
      {
        key: 'emotion',
        name: '情绪轴',
        meaning: '你怎么感受',
        short: '情绪',
        status: 'ready',
        score: 79,
        items: [
          { id: 'hsp', label: 'hsp', value: '高敏感人格', href: 'test-hsp.html' },
          { id: 'erq', label: 'erq', value: '思考派', href: 'test-erq.html' },
          { id: 'ecr', label: 'ecr', value: '专注型', href: 'test-ecr.html' }
        ]
      },
      {
        key: 'behavior',
        name: '行为轴',
        meaning: '你怎么行动',
        short: '行为',
        status: 'ready',
        score: 68,
        items: [
          { id: 'fmps', label: 'fmps', value: '中等完美主义', href: 'test-fmps.html' },
          { id: 'boundary-sense', label: 'boundary-sense', value: '边界探索者', href: 'test-boundary-sense.html' },
          { id: 'relationship-role', label: 'relationship-role', value: '关系角色画像', href: 'test-relationship-role.html' },
          { id: 'disc', label: 'disc', value: '待建', pending: true }
        ]
      },
      {
        key: 'motive',
        name: '动机轴',
        meaning: '你为什么这样',
        short: '动机',
        status: 'pending',
        score: 24,
        items: [
          { id: 'motive-pending', label: '待建', value: '即将上线', pending: true }
        ]
      }
    ];

    function renderSchemeB() {
      const root = document.getElementById('schemeB');
      root.innerHTML = axes.map((axis, index) => `
        <details class="accordion ${axis.status !== 'ready' ? 'placeholder' : ''}" ${index === 0 ? 'open' : ''}>
          <summary>
            <div class="accordion-summary-main">
              <div class="accordion-accent"></div>
              <div class="accordion-title-block">
                <h3 class="accordion-title">${axis.name}</h3>
                <p class="accordion-subtitle">${axis.meaning}</p>
              </div>
            </div>
            <span class="accordion-toggle">展开查看</span>
          </summary>
          <div class="accordion-body">
            <div class="result-grid">
              ${axis.items.map(item => {
                if (item.pending) {
                  return `
                    <span class="result-chip is-placeholder">
                      <span class="chip-label">${item.label}</span>
                      <span class="chip-value">${item.value}</span>
                    </span>
                  `;
                }
                return `
                  <a class="result-chip is-link" href="${item.href}">
                    <span class="chip-label">${item.label}</span>
                    <span class="chip-value">${item.value}</span>
                  </a>
                `;
              }).join('')}
            </div>
          </div>
        </details>
      `).join('');
    }

    function drawRadar() {
      const canvas = document.getElementById('radarCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const ratio = window.devicePixelRatio || 1;
      const cssWidth = canvas.clientWidth || 320;
      const cssHeight = 270;
      canvas.width = cssWidth * ratio;
      canvas.height = cssHeight * ratio;
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, cssWidth, cssHeight);

      const cx = cssWidth / 2;
      const cy = 128;
      const radius = Math.min(cssWidth * 0.31, 88);
      const levels = 4;
      const angles = [-Math.PI / 2, 0, Math.PI / 2, Math.PI];
      const values = [0.86, 0.79, 0.68, 0.24];
      const ready = [true, true, true, false];

      ctx.strokeStyle = 'rgba(74, 48, 115, 0.12)';
      ctx.lineWidth = 1;
      for (let l = 1; l <= levels; l++) {
        const r = radius * (l / levels);
        ctx.beginPath();
        angles.forEach((angle, i) => {
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.stroke();
      }

      angles.forEach((angle, i) => {
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(x, y);
        ctx.strokeStyle = ready[i] ? 'rgba(74, 48, 115, 0.16)' : 'rgba(117, 108, 130, 0.26)';
        if (!ready[i]) ctx.setLineDash([5, 5]); else ctx.setLineDash([]);
        ctx.stroke();
      });
      ctx.setLineDash([]);

      ctx.beginPath();
      angles.forEach((angle, i) => {
        const r = radius * values[i];
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fillStyle = 'rgba(74, 48, 115, 0.10)';
      ctx.strokeStyle = '#4A3073';
      ctx.lineWidth = 1.6;
      ctx.fill();
      ctx.stroke();

      angles.forEach((angle, i) => {
        const r = radius * values[i];
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        ctx.beginPath();
        ctx.arc(x, y, 4.5, 0, Math.PI * 2);
        ctx.fillStyle = ready[i] ? '#4A3073' : '#c7c0c9';
        ctx.fill();
      });

      const labels = ['特质', '情绪', '行为', '动机'];
      angles.forEach((angle, i) => {
        const x = cx + Math.cos(angle) * (radius + 24);
        const y = cy + Math.sin(angle) * (radius + 24);
        ctx.fillStyle = ready[i] ? '#4A3073' : '#766c82';
        ctx.font = '13px "Noto Serif SC", Georgia, serif';
        ctx.textAlign = i === 1 ? 'left' : i === 3 ? 'right' : 'center';
        ctx.textBaseline = i === 0 ? 'bottom' : i === 2 ? 'top' : 'middle';
        ctx.fillText(labels[i], x, y);
      });
    }

    renderSchemeB();
    drawRadar();
    window.addEventListener('resize', drawRadar);
  </script>
</body>
</html>
