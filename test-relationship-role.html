<script>


      function downloadResult() {
  const button = document.getElementById('saveResultBtn');
  const originalText = button ? button.textContent : '分享结果';
  if (button) {
    button.disabled = true;
    button.textContent = '保存中…';
  }
  try {
    generateResultCard();
  } finally {
    if (button) {
      button.disabled = false;
      button.textContent = originalText;
    }
  }
}

window.downloadResult = downloadResult;

function shareLongImage() {
  const button = document.getElementById('shareLongBtn');
  if (button) {
    button.disabled = true;
    button.textContent = '生成中…';
  }
  generateLongCard({
    captureSelector: '#resultView',
    testName: '关系角色测评',
    fileName: 'relationship-role-long'
  }).finally(() => {
    if (button) {
      button.disabled = false;
      button.textContent = '结果长图';
    }
  });
}

window.shareLongImage = shareLongImage;


function generateResultCard() {
  const existing = document.getElementById('__relationship-result-card__');
  if (existing) existing.remove();
  const card = document.createElement('div');
  card.id = '__relationship-result-card__';
  card.style.cssText = `
    position: fixed; top: -9999px; left: -9999px;
    width: 390px; height: 693px;
    background: #f5f0eb; overflow: hidden; display: flex; flex-direction: column;
    padding: 48px 36px; font-family: "Noto Serif SC", serif; box-sizing: border-box;
  `;
  card.innerHTML = `
    <div style="position:absolute;top:-60px;left:-60px;width:280px;height:280px;background:radial-gradient(ellipse,rgba(74,48,115,0.13),transparent 70%);pointer-events:none;"></div>

    <div style="position:relative;z-index:1;">

      <div style="height:1px;background:rgba(74,48,115,0.15);margin-bottom:28px;"></div>
    </div>
    <div style="flex:1;"></div>
    <div style="position:relative;z-index:1;">

      <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:#888;line-height:1.7;margin-bottom:16px;">${document.getElementById('resultQuote')?.textContent?.trim() || ''}</div>

      <span style="font-family:'Courier New',monospace;font-size:12px;color:#4A3073;letter-spacing:0.05em;">she is ______.</span>

  `;
  document.body.appendChild(card);
  return exportNodeAsImage(card, 'relationship-role-result').finally(() => card.remove());

    {"id":1,"text":"朋友深夜突然发来一长串消息，说自己快撑不住了。你更像会：","options":[{"value":"A","text":"先认真看完，一边安慰一边陪她把情绪说出来","tag":"倾听者"},{"value":"B","text":"马上问她在哪、要不要吃点东西，开始想怎么照顾她","tag":"照顾者"},{"value":"C","text":"直接说出你的担心和想法，也会分享你类似的经历","tag":"表达者"}]},

    "照顾者": {"title":"CAREGIVER — 照顾者","subtitle":"你照顾了所有人。现在轮到你问自己：谁在照顾我？","quote":"你照顾了所有人。现在轮到你问自己：谁在照顾我？","desc":"在关系里，你的第一反应是看见对方需要什么。一个眼神、一句话、一个微妙的变化——你就已经在行动了。倒水、安排、调整计划、替对方想到他们还没想到的事。\n\n你照顾人的方式很细致，细致到对方可能都没有完全意识到你做了多少。你把付出织进了日常的纹理里，安静、自然、不求回报。\n\n你能扛住很多——情绪的、实际的、别人可能扛不动的。你的肩膀一直都是可以靠的，而且你几乎从不抱怨这件事。\n\n但你有没有发现，你很少让别人照顾你？接受关心对你来说，比给出关心要难得多。","mode":"你的第一反应总是看见对方需要什么，然后去做。细致到对方可能都没有意识到你做了多少。你把付出织进了日常里，安静、自然、不求回报。","relationship":["你照顾别人的时候是自然的，但接受别人照顾的时候，你会觉得不安——像是欠了什么，或者失去了什么。","有时候你会发现自己很累，但说不出为什么——因为你做的每一件事单独看都很小，但加在一起是很重的。"],"reflect":"你最近有没有让别人照顾过你——哪怕只是一件小事？"},

      const state = { index: -1, answers: [], counts: {} };
      const introView = document.getElementById('introView');
      const quizView = document.getElementById('quizView');
      const resultView = document.getElementById('resultView');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const introDesc = document.getElementById('introDesc');
      const questionCounter = document.getElementById('questionCounter');
      const questionText = document.getElementById('questionText');
      const options = document.getElementById('options');
      const resultTag = document.getElementById('resultTag');
      const resultTitle = document.getElementById('resultTitle');
      const resultDesc = document.getElementById('resultDesc');
      const resultTags = document.getElementById('resultTags');
      const resultQuote = document.getElementById('resultQuote');
      const storyRec = document.getElementById('storyRec');
      const storyTitleEl = storyRec.querySelector('.story-rec-title');
      const storyLinkEl = storyRec.querySelector('.story-rec-btn');
      const storyIllustrations = {
        'story-detail.html': 'illustrations/story-queqie.png',
        'story-tuanzi-v3.html': 'illustrations/story-tuanzi.png',
        'story-xiaochen.html': 'illustrations/story-xiaochen.png',
        'story-xiaoli.html': 'illustrations/story-xiaoli.png',
        'story-xiuxiu.html': 'illustrations/story-xiuxiu.png',
        'story-zixingche.html': 'illustrations/story-zixingche.png',
        'story-bingbing.html': 'illustrations/story-bingbing.png'
      };

      const storyRecommendations = {
        '倾听者': { title: '曲奇：真空里的野蛮生长', url: 'story-detail.html', img: 'illustrations/story-queqie.png' },
        '照顾者': { title: '在北京，允许不长大', url: 'story-xiuxiu.html', img: 'illustrations/story-xiuxiu.png' },
        '表达者': { title: '世界需要"愤怒"的女孩', url: 'story-xiaochen.html', img: 'illustrations/story-xiaochen.png' }
      };

      function applyStoryRecommendation(tag) {
        const rec = storyRecommendations[tag] || storyRecommendations['倾听者'];
        const imgEl = document.querySelector('#storyRec .story-rec-img');
        const illustrationPath = rec.img || storyIllustrations[rec.url];
        storyTitleEl.textContent = rec.title;
        storyLinkEl.href = rec.url;
        if (imgEl && illustrationPath) {
          imgEl.style.background = `url('${illustrationPath}') center/cover no-repeat`;
        }
      }

      introDesc.textContent = `${testData.description} 共 ${testData.questions.length} 题。`;

      function setView(view) {
        [introView, quizView, resultView].forEach((el) => el.classList.add('hidden'));
        view.classList.remove('hidden');
      }

      function updateProgress() {
        const total = testData.questions.length;
        if (state.index < 0) {
          progressText.textContent = '准备开始';
          progressBar.style.width = '0%';
          return;
        }
        if (state.index >= total) {
          progressText.textContent = `已完成 · 共${total}题`;
          progressBar.style.width = '100%';
          return;
        }
        progressText.textContent = `第${state.index + 1}题 / 共${total}题`;
        progressBar.style.width = `${((state.index + 1) / total) * 100}%`;
      }

      function renderQuestion() {
        updateProgress();
        const question = testData.questions[state.index];
        questionCounter.textContent = `Question ${state.index + 1}`;
        questionText.textContent = question.text;
        options.innerHTML = '';
        question.options.forEach((option) => {
          const button = document.createElement('button');
          button.className = 'option';
          button.type = 'button';
          button.innerHTML = `<span class="option-mark">${option.value}</span><span class="option-copy">${option.text}</span>`;
          button.addEventListener('click', () => chooseOption(option));
          options.appendChild(button);
        });
      }

      function chooseOption(option) {
        state.answers[state.index] = option.tag;
        state.counts[option.tag] = (state.counts[option.tag] || 0) + 1;
        const active = options.children;
        for (const item of active) item.disabled = true;
        setTimeout(() => {
          state.index += 1;
          if (state.index >= testData.questions.length) {
            renderResult();
          } else {
            renderQuestion();
          }
        }, 220);
      }

      function getTopTag() {
        const priority = ['倾听者', '照顾者', '表达者'];
        return priority.reduce((best, current) => {
          const bestCount = state.counts[best] || 0;
          const currentCount = state.counts[current] || 0;
          return currentCount > bestCount ? current : best;
        }, priority[0]);
      }

      function formatParagraphs(text) {
        return String(text || '').split(/\n+/).filter(Boolean).map(item => `<p>${item.replace(/<[^>]+>/g, '')}</p>`).join('');
      }
      function renderViz(counts) {
        const total = Math.max(1, state.answers.length);
        const order = ['倾听者','照顾者','表达者'];
        document.getElementById('resultViz').innerHTML = order.map((key) => {
          const value = counts[key] || 0;
          return `<div class="score-row"><span class="score-label">${key}</span><div class="score-bar-bg"><div class="score-bar-fill" style="width:${(value / total * 100).toFixed(0)}%"></div></div><span class="score-val">${value}</span></div>`;
        }).join('');
      }
      function renderResult() {
        updateProgress();
        const tag = getTopTag();
        const result = testData.results[tag];
        resultTag.textContent = tag;
        if (resultTags) resultTags.innerHTML = ['结果画像', 'She Is'].map(item => `<li class="result-tag">${item}</li>`).join('');
        if (resultQuote) resultQuote.textContent = result.quote || result.subtitle || result.title || tag;
        let captionEl = document.querySelector('.share-caption');
        if (!captionEl && resultQuote) {
          captionEl = document.createElement('p');
          captionEl.className = 'share-caption';
          captionEl.textContent = '↑ 分享卡片中会显示这句话';
          resultQuote.after(captionEl);
        }
        resultTitle.textContent = result.title;
        resultTitle.dataset.cardType = result.title.split(/\s+—\s+/)[0] || result.title;
        resultTitle.dataset.subtitle = result.subtitle || result.title.split(/\s+—\s+/).slice(1).join(' — ') || '';
        resultDesc.innerHTML = `
          ${formatParagraphs(result.desc)}
          <div class="section"><h3 class="section-title">你的角色模式</h3><div class="section-content"><p>${result.mode || ''}</p></div></div>
          <div class="section"><h3 class="section-title">在关系里</h3><div class="section-content"><ul class="list">${(result.relationship || []).map(item => `<li>${item}</li>`).join('')}</ul></div></div>
          <div class="section"><h3 class="section-title">值得想一想</h3><div class="section-content"><p>${result.reflect || ''}</p></div></div>
          <p>这是你当下的模式，不是诊断，也不是定论。</p>
        `;
        renderViz(state.counts);
        if (window.SheProfileStore) {
          const counts = { ...state.counts };
          const topEntry = Object.entries(counts).sort((a, b) => b[1] - a[1])[0] || [tag, 0];
          window.SheProfileStore.saveResult({
            moduleId: 'relationship-role',
            moduleName: '关系角色',
            summary: tag.replace(/ — .*/, '').slice(0, 4),
            score: counts,
            topDimension: topEntry[0]
          });
        }
        applyStoryRecommendation(tag);
        setView(resultView);
        storyRec.style.display = 'block';
      }

      function startQuiz() {
        state.index = 0;
        state.answers = [];
        state.counts = {};
        setView(quizView);
        storyRec.style.display = 'none';
        renderQuestion();
      }

      function renderStoredResult(record) {
        if (!record) return false;
        const tag = record.topDimension || record.summary || '倾听者';
        const result = testData.results[tag] || testData.results['倾听者'];
        resultTag.textContent = tag;
        if (resultTags) resultTags.innerHTML = ['结果画像', 'She Is'].map(item => `<li class="result-tag">${item}</li>`).join('');
        if (resultQuote) resultQuote.textContent = result.quote || result.subtitle || result.title || tag;
        resultTitle.textContent = result.title;
        resultTitle.dataset.cardType = result.title.split(/\s+—\s+/)[0] || result.title;
        resultTitle.dataset.subtitle = result.subtitle || result.title.split(/\s+—\s+/).slice(1).join(' — ') || '';
        resultDesc.innerHTML = `${formatParagraphs(result.desc)}<div class="section"><h3 class="section-title">你的角色模式</h3><div class="section-content"><p>${result.mode || ''}</p></div></div><div class="section"><h3 class="section-title">在关系里</h3><div class="section-content"><ul class="list">${(result.relationship || []).map(item => `<li>${item}</li>`).join('')}</ul></div></div><div class="section"><h3 class="section-title">值得想一想</h3><div class="section-content"><p>${result.reflect || ''}</p></div></div><p>这是你上次保存的结果详情。</p>`;
        renderViz(record.score || {});
        setView(resultView);
        storyRec.style.display = 'none';
        return true;
      }

      function maybeRestoreSavedResult() {
        if (!window.SheProfileStore) return;
        const record = window.SheProfileStore.getResult('relationship-role');
        if (!record) return;
        const startBtn = document.getElementById('startBtn');
        if (startBtn && !document.getElementById('viewLastResultBtn')) {
          const btn = document.createElement('button');
          btn.id = 'viewLastResultBtn'; btn.type = 'button'; btn.className = 'secondary'; btn.textContent = '查看上次结果';
          btn.addEventListener('click', () => renderStoredResult(record));
          startBtn.insertAdjacentElement('afterend', btn);
        }
        if (window.SheProfileStore.wantsResultView()) renderStoredResult(record);
      }

      document.getElementById('startBtn').addEventListener('click', startQuiz);
      document.getElementById('restartBtn').addEventListener('click', startQuiz);
      storyRec.style.display = 'none';

      updateProgress();
      maybeRestoreSavedResult();
    </script>
