<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高敏感测评结果卡片</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Courier+Prime:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ddd8d1;
    padding: 24px;
    font-family: "Noto Serif SC", serif;
  }

  .card {
    width: 390px;
    height: 693px;
    background: #f5f0eb;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 48px 36px;
    border-radius: 4px;
  }

  .card::before,
  .card::after {
    content: "";
    position: absolute;
    pointer-events: none;
    z-index: 0;
  }

  .card::before {
    width: 280px;
    height: 280px;
    top: -110px;
    left: -95px;
    background: radial-gradient(circle, rgba(74, 48, 115, 0.18) 0%, rgba(74, 48, 115, 0.08) 38%, rgba(74, 48, 115, 0) 72%);
  }

  .card::after {
    width: 300px;
    height: 300px;
    right: -120px;
    bottom: -125px;
    background: radial-gradient(circle, rgba(74, 48, 115, 0.14) 0%, rgba(74, 48, 115, 0.06) 42%, rgba(74, 48, 115, 0) 74%);
  }

  .test-name,
  .result-type,
  .quote,
  .score,
  .footer {
    position: relative;
    z-index: 1;
  }

  .test-name {
    font-family: "Noto Serif SC", serif;
    font-size: 10px;
    color: #888;
    letter-spacing: 0.2em;
  }

  .spacer {
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .result-type {
    font-family: "Cormorant Garamond", serif;
    font-size: 50px;
    font-weight: 500;
    color: #4A3073;
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .quote {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: 24px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .score {
    font-family: "Noto Serif SC", serif;
    font-size: 11px;
    color: #888;
    margin-bottom: 28px;
  }

  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .site {
    font-family: "Courier Prime", monospace;
    font-size: 9px;
    color: #bbb;
  }

  .brand {
    font-family: "Courier Prime", monospace;
    font-size: 10px;
    color: #888;
  }
</style>
</head>
<body>
  <div class="card" id="result-card">
    <div class="test-name">高敏感测评 · HSP</div>
    <div class="spacer"></div>
    <div class="result-type">高敏感人格</div>
    <div class="quote">你的神经系统像一台增益开得很大的收音机，信号和噪音一起进来。</div>
    <div class="score">平均得分 5.8 / 7</div>
    <div class="spacer"></div>
    <div class="footer">
      <div class="site">she-is-app.netlify.app</div>
      <div class="brand">she is ______.</div>
    </div>
  </div>
</body>
</html>
