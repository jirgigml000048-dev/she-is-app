<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>行为风格测评 | 女也 She Is</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg: #f5f0eb;
      --brand: #4A3073;
      --ink: #2a2a2a;
      --muted: #7e726b;
      --line: rgba(74, 48, 115, 0.14);
      --card: rgba(255,255,255,0.56);
      --shadow: 0 24px 60px rgba(74, 48, 115, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Serif SC", Georgia, serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button, input { font: inherit; }
    .page {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 24px 40px;
      position: relative;
    }
    .glow, .glow-2 {
      position: fixed;
      border-radius: 999px;
      pointer-events: none;
      z-index: 0;
      filter: blur(56px);
      opacity: .55;
    }
    .glow { width: 220px; height: 220px; background: rgba(74,48,115,.08); top: -50px; right: -60px; }
    .glow-2 { width: 180px; height: 180px; background: rgba(74,48,115,.06); bottom: -50px; left: -50px; }
    .page > * { position: relative; z-index: 1; }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 34px;
    }
    .brand-mark {
      font-size: 20px;
      color: var(--brand);
      letter-spacing: .18em;
      font-weight: 600;
    }
    .brand-sub {
      font-family: Georgia, "Noto Serif SC", serif;
      font-size: 15px;
      font-style: italic;
      color: rgba(74,48,115,.85);
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 28px 0 18px;
    }
    .back {
      display: inline-block;
      color: var(--brand);
      font-size: 14px;
      text-decoration: none;
    }
    .back:hover { color: #3d2565; }
    .logo {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-end;
      margin: 0;
      text-align: right;
    }
    .logo-cn {
      display: block;
      font-family: "Cormorant Garamond", serif;
      font-size: 28px;
      line-height: 1;
      font-weight: 600;
      color: #1c1c1c;
      letter-spacing: 0.12em;
    }
    .logo-en {
      display: block;
      font-family: "Courier New", Courier, monospace;
      font-size: 11px;
      color: #888;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }
    .header-line {
      height: 1px;
      background: rgba(74, 48, 115, 0.28);
      margin-bottom: 24px;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    .hero-title, .result-title-main {
      font-size: 31px;
      line-height: 1.28;
      letter-spacing: .02em;
      margin: 0;
      color: var(--ink);
      text-wrap: balance;
    }
    .hero-desc, .muted {
      margin: 16px 0 0;
      font-size: 14px;
      line-height: 1.95;
      color: var(--muted);
    }
    .hero-meta {
      margin-top: 18px;
      font-size: 12px;
      color: #999;
      letter-spacing: 0.05em;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--brand);
      font-size: 12px;
      letter-spacing: .08em;
      margin-bottom: 24px;
      background: rgba(255,255,255,.36);
    }
    .primary-btn, .secondary-btn, .share-btn {
      appearance: none;
      border-radius: 999px;
      padding: 14px 18px;
      cursor: pointer;
      transition: transform .16s ease, opacity .16s ease, background-color .16s ease;
    }
    .primary-btn:hover, .secondary-btn:hover, .share-btn:hover { transform: translateY(-1px); }
    .primary-btn {
      width: 100%;
      margin-top: 34px;
      border: 1px solid var(--brand);
      background: var(--brand);
      color: #fff;
      font-size: 14px;
      letter-spacing: .12em;
    }
    .secondary-btn {
      width: 100%;
      margin-top: 16px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--brand);
      font-size: 13px;
    }
    .progress-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .06em;
      margin-bottom: 12px;
    }
    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(74,48,115,.08);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--brand);
      transition: width .28s ease;
    }
    .question-label {
      font-size: 11px;
      letter-spacing: .18em;
      color: var(--brand);
      margin-bottom: 18px;
    }
    .question-text {
      margin: 0;
      font-size: 22px;
      line-height: 1.7;
      text-wrap: balance;
    }
    .options {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }
    .option {
      width: 100%;
      text-align: left;
      padding: 16px 16px;
      border: 1px solid rgba(74,48,115,.12);
      border-radius: 18px;
      background: rgba(255,255,255,.52);
      color: var(--ink);
      line-height: 1.8;
      font-size: 14px;
      box-shadow: 0 8px 20px rgba(74,48,115,.04);
    }
    .option small {
      display: block;
      color: var(--brand);
      font-size: 11px;
      letter-spacing: .08em;
      margin-bottom: 6px;
    }
    .option.selected {
      border-color: var(--brand);
      background: rgba(74,48,115,.08);
      box-shadow: 0 10px 24px rgba(74,48,115,.08);
    }
    .nav-row {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .nav-row .secondary-btn,
    .nav-row .primary-btn { margin-top: 0; width: 100%; }

    .result-capture {
      background: transparent;
    }
    .result-header {
      margin-bottom: 28px;
    }
    .result-header .brand { margin-bottom: 0; }
    .dimension-list {
      display: grid;
      gap: 18px;
      margin-top: 10px;
    }
    .dimension-item { }
    .dimension-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .dimension-name {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 12px;
      color: var(--ink);
      line-height: 1.4;
    }
    .dimension-name strong {
      font-size: 13px;
      font-weight: 500;
      color: inherit;
    }
    .dimension-item.is-top .dimension-name,
    .dimension-item.is-top .dimension-name strong,
    .dimension-item.is-top .dimension-score {
      color: var(--brand);
      font-weight: 600;
    }
    .dimension-score {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .bar {
      width: 100%;
      height: 8px;
      background: rgba(74,48,115,.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: rgba(74,48,115,.18);
      border-radius: inherit;
    }
    .dimension-item.is-top .bar-fill { background: var(--brand); }

    .result-type {
      margin-top: 36px;
      font-size: 28px;
      line-height: 1.45;
      color: var(--ink);
      text-wrap: balance;
    }
    .quote-block {
      margin: 24px 0;
      padding-left: 16px;
      border-left: 3px solid var(--brand);
      font-size: 18px;
      line-height: 1.9;
      color: var(--brand);
      font-style: italic;
    }
    .body-copy p {
      margin: 0 0 18px;
      color: var(--ink);
      line-height: 1.95;
    }
    .body-copy p:first-child { font-size: 15px; }
    .body-copy p:not(:first-child) { font-size: 14px; }
    .section-title {
      margin: 48px 0 18px;
      padding-left: 12px;
      border-left: 2px solid var(--brand);
      font-size: 11px;
      letter-spacing: .15em;
      font-weight: 600;
      color: var(--brand);
      text-transform: uppercase;
    }
    .section-copy {
      font-size: 14px;
      line-height: 1.95;
      color: var(--ink);
    }
    .daily-list {
      display: grid;
      gap: 20px;
      margin-top: 4px;
    }
    .daily-item {
      font-size: 14px;
      line-height: 1.95;
      color: var(--ink);
    }
    .reflective {
      font-size: 16px;
      line-height: 1.95;
      color: var(--brand);
      font-style: italic;
    }
    .share-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 24px;
    }
    .result-nav-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .result-nav-link {
      display: block;
      width: 100%;
      text-align: center;
      border-radius: 10px;
      padding: 13px 0;
      font-size: 13px;
      text-decoration: none;
    }
    .result-nav-link.primary {
      background: var(--brand);
      color: #fff;
      border: 1px solid var(--brand);
    }
    .result-nav-link.secondary {
      background: transparent;
      color: var(--brand);
      border: 1px solid rgba(74,48,115,.25);
    }
    .share-btn {
      border: 1px solid var(--brand);
      background: #fff;
      color: var(--brand);
      font-size: 13px;
      padding: 13px 10px;
    }
    .reset-btn {
      width: 100%;
      margin-top: 16px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
    }

    .capture-shell, .quote-card-shell {
      position: fixed;
      left: -99999px;
      top: 0;
      width: 480px;
      pointer-events: none;
      opacity: 0;
    }
    .capture-poster {
      width: 480px;
      background: var(--bg);
      color: var(--ink);
      padding: 28px 24px 24px;
      font-family: "Noto Serif SC", Georgia, serif;
    }
    .poster-footer {
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid rgba(74,48,115,.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: rgba(74,48,115,.72);
      letter-spacing: .08em;
    }
    .quote-card {
      width: 480px;
      height: 693px;
      position: relative;
      overflow: hidden;
      background: #f5f0eb;
      color: var(--ink);
      padding: 48px 36px;
      font-family: "Noto Serif SC", Georgia, serif;
      display: flex;
      flex-direction: column;
    }
    .quote-card::before,
    .quote-card::after {
      content: "";
      position: absolute;
      pointer-events: none;
      width: 280px;
      height: 280px;
      background: radial-gradient(ellipse, rgba(74,48,115,0.13), transparent 70%);
    }
    .quote-card::before {
      top: -60px;
      left: -60px;
    }
    .quote-card::after {
      right: -60px;
      bottom: -60px;
    }
    .quote-card > * { position: relative; z-index: 1; }
    .quote-card-head {
      font-size: 12px;
      color: #4A3073;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(74,48,115,0.15);
      margin-bottom: 28px;
    }
    .quote-card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .quote-card-type {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 44px;
      font-weight: 600;
      line-height: 1.1;
      color: #4A3073;
    }
    .quote-card-quote {
      margin-top: 16px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 16px;
      line-height: 1.7;
      color: #888;
      font-style: italic;
    }
    .quote-card-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
    }
    .quote-card-foot-left {
      font-size: 9px;
      color: #bbb;
      font-family: "Courier New", Courier, monospace;
    }
    .quote-card-foot-right {
      font-size: 12px;
      color: #4A3073;
      font-family: "Cormorant Garamond", Georgia, serif;
    }
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(22, 16, 30, .72);
      padding: 20px;
      z-index: 20;
    }
    .modal.active { display: flex; }
    .modal-inner {
      position: relative;
      max-width: min(92vw, 420px);
      width: 100%;
      text-align: center;
    }
    .modal-close {
      position: absolute;
      top: -18px;
      right: -4px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,.92);
      color: var(--brand);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }
    .modal img {
      max-width: 100%;
      max-height: 78vh;
      display: block;
      margin: 0 auto;
      border-radius: 18px;
      box-shadow: 0 30px 80px rgba(0,0,0,.24);
    }
    .modal-tip {
      margin-top: 14px;
      color: #fff;
      font-size: 13px;
      letter-spacing: .06em;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow-2"></div>

  <main class="page">

    <header class="page-header">
      <a class="back" href="assessment.html">← 测评</a>
      <div class="logo" aria-label="女也 she is ______.">
        <span class="logo-cn">女也</span>
        <span class="logo-en">she is ______.</span>
      </div>
    </header>
    <div class="header-line"></div>
    <section id="introScreen" class="screen active">
      <div class="pill">DISC · 行为风格</div>
      <h1 class="hero-title">行为风格测评</h1>
      <p class="hero-desc">同样面对一个问题，有人第一反应是直接推进，有人是先把所有人的感受照顾好，有人需要把每个细节想清楚才能开始，有人会等情况稳定了再行动。</p>
      <p class="hero-desc">这四种方式没有优劣之分，它们只是不同的行为风格——你在压力下怎么反应，你和团队的互动方式，你做决定时的本能。</p>
      <p class="hero-desc">12题，每题选一个最像你的，大概5分钟。</p>
      <div class="hero-meta">12 题 · 约 5 分钟 · 行为风格探索</div>
      <button class="primary-btn" id="startBtn">开始测评</button>
    </section>

    <section id="quizScreen" class="screen">
      <div class="progress-meta">
        <span id="progressText">01 / 12</span>
        <span>DISC</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="question-label" id="questionLabel">Q1</div>
      <h2 class="question-text" id="questionText"></h2>
      <div class="options" id="options"></div>
      <div class="nav-row">
        <button class="secondary-btn" id="prevBtn" type="button">上一题</button>
        <button class="primary-btn" id="nextBtn" type="button">下一题</button>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div id="result-capture" class="result-capture"></div>
      <div class="share-row">
        <button class="share-btn" id="shareLongBtn" type="button">结果长图</button>
        <button class="share-btn" id="shareQuoteBtn" type="button">分享金句</button>
      </div>
      <div class="result-nav-row">
        <a class="result-nav-link secondary" href="index.html">返回首页</a>
        <a class="result-nav-link primary" href="profile.html">查看我的画像</a>
      </div>
      <button class="reset-btn" id="restartBtn" type="button">再做一次</button>
    </section>
  </main>

  <div class="modal" id="shareModal" aria-hidden="true">
    <div class="modal-inner">
      <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
      <img id="modalImage" alt="分享图片预览" />
      <div class="modal-tip">长按保存</div>
    </div>
  </div>

  <script>
    const QUESTIONS = [
      {
        id: 1,
        text: '团队要做一个决定，但大家迟迟没有进展。你更可能：',
        options: [
          { dim: 'C', text: '先把所有选项的利弊列清楚，再讨论' },
          { dim: 'I', text: '先把大家的想法都摆出来，让气氛活起来' },
          { dim: 'D', text: '直接说出你的判断，推动做决定' },
          { dim: 'S', text: '等大家都说完，再给出你的看法' }
        ]
      },
      {
        id: 2,
        text: '你被交代了一个任务，但给的信息不够完整。你更可能：',
        options: [
          { dim: 'S', text: '等信息更完整再开始，不想做一半重来' },
          { dim: 'D', text: '先动起来，边做边调整' },
          { dim: 'C', text: '整理出所有不确定的地方，逐一确认后再做' },
          { dim: 'I', text: '先去找相关的人聊聊，搞清楚背景' }
        ]
      },
      {
        id: 3,
        text: '和别人发生了分歧，对方坚持他的观点。你更可能：',
        options: [
          { dim: 'I', text: '试着找到你们之间的共同点，把气氛缓和下来' },
          { dim: 'C', text: '用数据或逻辑来支撑你的观点' },
          { dim: 'S', text: '退一步，看看对方的角度有没有道理' },
          { dim: 'D', text: '把你的理由再说一遍，更直接地坚持' }
        ]
      },
      {
        id: 4,
        text: '你在一个新环境里认识了一群陌生人。你更可能：',
        options: [
          { dim: 'D', text: '很快找到你想深入交流的人，主动建立连接' },
          { dim: 'S', text: '先观察，等有人来和你说话' },
          { dim: 'I', text: '很快和很多人聊起来，让整个场子活跃' },
          { dim: 'C', text: '更关注观察这群人的互动模式，少说多看' }
        ]
      },
      {
        id: 5,
        text: '你负责的一件事出了问题。你更可能：',
        options: [
          { dim: 'I', text: '第一反应是和团队说清楚，保持透明' },
          { dim: 'D', text: '马上找到解决方案，优先把问题解决' },
          { dim: 'C', text: '先搞清楚问题的根本原因，再决定怎么做' },
          { dim: 'S', text: '先稳住情绪和局面，再一步步处理' }
        ]
      },
      {
        id: 6,
        text: '别人给你反馈说你做的东西有不足。你更可能：',
        options: [
          { dim: 'C', text: '把反馈记下来，对照自己的标准仔细想' },
          { dim: 'I', text: '看对方说的方式，如果方式不对你会先有情绪' },
          { dim: 'D', text: '听完就想怎么改进，不太在意对方的措辞' },
          { dim: 'S', text: '认真听，会想很久对方说的对不对' }
        ]
      },
      {
        id: 7,
        text: '工作节奏突然加快，事情一下子多了很多。你更可能：',
        options: [
          { dim: 'S', text: '默默扛着，不太会说自己的压力' },
          { dim: 'C', text: '把所有事情列出来，有系统地一件件处理' },
          { dim: 'I', text: '保持乐观，想办法把团队的士气带起来' },
          { dim: 'D', text: '分出轻重缓急，优先搞定最重要的' }
        ]
      },
      {
        id: 8,
        text: '你参与一个长期项目，中途方向变了。你更可能：',
        options: [
          { dim: 'C', text: '想清楚变化带来的每一个影响，再决定' },
          { dim: 'S', text: '需要时间适应，不喜欢半途改变' },
          { dim: 'D', text: '快速评估新方向，决定要不要跟着变' },
          { dim: 'I', text: '先关心团队的状态，确认大家都还在一起' }
        ]
      },
      {
        id: 9,
        text: '你有一个新想法，但还不成熟。你更可能：',

    const introScreen = document.getElementById('introScreen');

    function showScreen(name) {
      [introScreen, quizScreen, resultScreen].forEach(el => el.classList.remove('active'));
      if (name === 'intro') introScreen.classList.add('active');
      if (name === 'quiz') quizScreen.classList.add('active');
      if (name === 'result') resultScreen.classList.add('active');
    }

    function renderQuestion() {
      const q = QUESTIONS[state.index];
      questionLabel.textContent = `Q${q.id}`;
      questionText.textContent = q.text;
      progressText.textContent = `${String(state.index + 1).padStart(2, '0')} / ${QUESTIONS.length}`;
      progressFill.style.width = `${((state.index) / QUESTIONS.length) * 100}%`;
      optionsEl.innerHTML = q.options.map((opt, idx) => {
        const selected = state.answers[state.index] === idx ? 'selected' : '';
        return `<button type="button" class="option ${selected}" data-index="${idx}"><small>${opt.dim}</small>${opt.text}</button>`;
      }).join('');
      document.getElementById('prevBtn').disabled = state.index === 0;
      document.getElementById('prevBtn').style.opacity = state.index === 0 ? '.45' : '1';
      document.getElementById('nextBtn').textContent = state.index === QUESTIONS.length - 1 ? '查看结果' : '下一题';
    }

    function getScores() {
      const scores = { D: 0, I: 0, S: 0, C: 0 };
      state.answers.forEach((answerIdx, qIndex) => {
        const opt = QUESTIONS[qIndex].options[answerIdx];
        if (opt) scores[opt.dim] += 1;
      });
      return scores;
    }

    function resolveType(scores) {
      const ordered = Object.entries(scores).sort((a, b) => {
        if (b[1] !== a[1]) return b[1] - a[1];
        return ['D','I','S','C'].indexOf(a[0]) - ['D','I','S','C'].indexOf(b[0]);
      });
      const [primary, pScore] = ordered[0];
      const [secondary, sScore] = ordered[1];
      const diff = pScore - sScore;
      const allowedCombos = new Set(['DI','DC','DS','ID','IS','IC','SC','CS']);
      const combo = `${primary}${secondary}`;
      const typeKey = diff <= 2 && allowedCombos.has(combo) ? combo : primary;
      return { typeKey, primary, secondary, ordered };
    }

    function renderResult() {
      const scores = getScores();
      const resolved = resolveType(scores);
      const content = RESULTS[resolved.typeKey];
      const topScore = Math.max(...Object.values(scores));
      window._currentQuote = content.quote;
      window._currentTypeName = content.title;

      const dimensionHtml = ['D', 'I', 'S', 'C'].map(key => {
        const info = DIMENSIONS[key];
        const val = scores[key];
        const isTop = val === topScore;
        return `
          <div class="dimension-item ${isTop ? 'is-top' : ''}">
            <div class="dimension-top">
              <div class="dimension-name">
                <strong>${key} — ${info.en}</strong>
                <span>${info.zh}</span>
              </div>
              <div class="dimension-score">${val}/12</div>
            </div>
            <div class="bar"><div class="bar-fill" style="width:${(val / 12) * 100}%"></div></div>
          </div>
        `;
      }).join('');

      const bodyHtml = content.body.map(p => `<p>${p}</p>`).join('');
      const dailyHtml = content.daily.map(item => `<div class="daily-item">— ${item}</div>`).join('');

      resultCapture.innerHTML = `
        <div class="result-header">
          <div class="brand">
            <div class="brand-mark">女也</div>
            <div class="brand-sub">she is ______.</div>
          </div>
        </div>
        <div class="dimension-list">${dimensionHtml}</div>
        <h1 class="result-type">${content.title}</h1>
        <div class="quote-block">${content.quote}</div>
        <div class="body-copy">${bodyHtml}</div>
        <div>
          <div class="section-title">你的行为风格</div>
          <div class="section-copy">${content.style}</div>
        </div>
        <div>
          <div class="section-title">在日常里</div>
          <div class="daily-list">${dailyHtml}</div>
        </div>
        <div>
          <div class="section-title">值得想一想</div>
          <div class="reflective">${content.reflect}</div>
        </div>
      `;

      progressFill.style.width = '100%';
      showScreen('result');
    }

    function nextQuestion() {
      if (state.answers[state.index] === null) return;
      if (state.index === QUESTIONS.length - 1) {
        renderResult();
        return;
      }
      state.index += 1;
      renderQuestion();
    }

    function previousQuestion() {
      if (state.index === 0) return;
      state.index -= 1;
      renderQuestion();
    }

    function restartQuiz() {
      state.index = 0;
      state.answers = Array(QUESTIONS.length).fill(null);
      progressFill.style.width = '0%';
      showScreen('intro');
    }

    async function captureElement(el) {
      const canvas = await html2canvas(el, {
        backgroundColor: '#f5f0eb',
        scale: Math.min(window.devicePixelRatio || 2, 3),
        useCORS: true,
        allowTaint: true
      });
      return canvas.toDataURL('image/png');
    }

    function openModal(src) {
      modalImage.src = src;
      modal.classList.add('active');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
      modalImage.src = '';
    }

    async function shareLongImage() {
      const shell = document.createElement('div');
      shell.className = 'capture-shell';
      shell.innerHTML = `
        <div class="capture-poster">
          ${resultCapture.innerHTML}
          <div class="poster-footer">
            <span>行为风格测评 · DISC</span>
            <span>女也 she is ______.</span>
          </div>
        </div>
      `;
      document.body.appendChild(shell);
      try {
        const src = await captureElement(shell.firstElementChild);
        openModal(src);
      } finally {
        shell.remove();
      }
    }

    function generateResultCard(typeName, quote) {
      const shell = document.createElement('div');
      shell.className = 'quote-card-shell';
      const rawTypeName = (window._currentTypeName || typeName || 'DISC').trim();
      const [typeShortRaw, ...typeDescParts] = rawTypeName.split('·');
      const typeShort = (typeShortRaw || '').trim();
      const typeDesc = typeDescParts.join('·').trim();
      const typeMarkup = typeDesc
        ? `
            <div style="font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 600; color: #4A3073; line-height: 1.0;">${typeShort}</div>
            <div style="font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 400; color: #4A3073; margin-top: 8px; letter-spacing: 0.05em;">${typeDesc}</div>
          `
        : `<div style="font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 600; color: #4A3073; line-height: 1.0;">${rawTypeName}</div>`;
      shell.innerHTML = `
        <div class="quote-card">
          <div class="quote-card-head">行为风格测评 · DISC</div>
          <div class="quote-card-body">
            <div class="quote-card-type">${typeMarkup}</div>
            <div class="quote-card-quote">${quote}</div>
          </div>
          <div class="quote-card-foot">
            <span class="quote-card-foot-left">she-is-app.netlify.app</span>
            <span class="quote-card-foot-right">she is ______.</span>
          </div>
        </div>
      `;
      return shell;
    }

    async function shareQuoteCard() {
      const shell = generateResultCard(window._currentTypeName || 'DISC', window._currentQuote || '');
      document.body.appendChild(shell);
      try {
        const src = await captureElement(shell.firstElementChild);
        openModal(src);
      } finally {
        shell.remove();
      }
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      showScreen('quiz');
      renderQuestion();
    });

    document.getElementById('options').addEventListener('click', (event) => {
      const btn = event.target.closest('.option');
      if (!btn) return;
      state.answers[state.index] = Number(btn.dataset.index);
      renderQuestion();
    });

    document.getElementById('nextBtn').addEventListener('click', nextQuestion);
    document.getElementById('prevBtn').addEventListener('click', previousQuestion);
    document.getElementById('restartBtn').addEventListener('click', restartQuiz);
    document.getElementById('shareLongBtn').addEventListener('click', shareLongImage);
    document.getElementById('shareQuoteBtn').addEventListener('click', shareQuoteCard);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('shareModal').addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });

    window.shareLongImage = shareLongImage;
    window.generateResultCard = generateResultCard;
  </script>
</body>
</html>
