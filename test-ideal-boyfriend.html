<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>你的理想型男友 | 女也 She Is</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Courier+Prime:wght@400;700&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/font-override.css" />
    <style>
      :root {
        --bg: #f5f0eb;
        --paper: rgba(255, 255, 255, 0.84);
        --ink: #2d2338;
        --brand: #4A3073;
        --brand-soft: rgba(74, 48, 115, 0.12);
        --line: rgba(74, 48, 115, 0.14);
        --muted: rgba(74, 48, 115, 0.68);
        --shadow: 0 18px 44px rgba(74, 48, 115, 0.09);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(74, 48, 115, 0.14), transparent 34%),
          radial-gradient(circle at bottom right, rgba(74, 48, 115, 0.09), transparent 32%),
          var(--bg);
        color: var(--ink);
        font-family: "Noto Serif SC", "Source Han Serif SC", serif;
        line-height: 1.85;
      }
      .glow {
        position: fixed;
        pointer-events: none;
        z-index: 0;
        border-radius: 50%;
        filter: blur(80px);
      }
      .glow.top {
        width: 320px;
        height: 320px;
        top: -120px;
        left: -80px;
        background: rgba(74, 48, 115, 0.1);
      }
      .glow.bottom {
        width: 280px;
        height: 280px;
        right: -60px;
        bottom: -80px;
        background: rgba(74, 48, 115, 0.08);
      }
      .page {
        position: relative;
        z-index: 1;
        max-width: 760px;
        margin: 0 auto;
        padding: 22px 18px 40px;
      }
      .back {
        display: inline-block;
        margin-bottom: 16px;
        color: var(--brand);
        text-decoration: none;
        font-size: 14px;
      }
      .progress-shell {
        height: 2px;
        border-radius: 999px;
        background: rgba(74, 48, 115, 0.08);
        overflow: hidden;
        margin-bottom: 12px;
      }
      .progress-bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, var(--brand), rgba(74, 48, 115, 0.28));
        transition: width .25s ease;
      }
      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: .06em;
      }
      .panel {
        background: var(--paper);
        border: 1px solid rgba(255,255,255,.65);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        padding: 30px 22px;
      }
      .hidden { display: none; }
      .eyebrow {
        margin: 0 0 8px;
        color: var(--muted);
        font-family: "Courier Prime", monospace;
        font-size: 11px;
        letter-spacing: .16em;
        text-transform: uppercase;
      }
      .title {
        margin: 0;
        font-family: "Cormorant Garamond", "Noto Serif SC", serif;
        font-size: 44px;
        line-height: 1.08;
        color: var(--ink);
        letter-spacing: .03em;
      }
      .subtitle, .body-copy {
        margin: 12px 0 0;
        color: #5f5968;
        font-size: 15px;
      }
      .intro-card {
        margin-top: 22px;
        padding: 18px;
        border-radius: 18px;
        background: rgba(74, 48, 115, 0.05);
        border: 1px solid var(--line);
      }
      .intro-points {
        margin: 16px 0 0;
        padding-left: 18px;
        color: #4f4a57;
        font-size: 14px;
      }
      .intro-points li + li { margin-top: 8px; }
      .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 26px;
      }
      button, .link-btn {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 20px;
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
        transition: transform .18s ease, opacity .18s ease, box-shadow .18s ease, background-color .18s ease;
      }
      button:hover, .link-btn:hover { transform: translateY(-1px); }
      .primary {
        color: #fff;
        background: linear-gradient(135deg, var(--brand), #6b489e);
        box-shadow: 0 10px 24px rgba(74, 48, 115, 0.18);
      }
      .ghost, .link-btn {
        color: var(--brand);
        background: transparent;
        border: 1px solid var(--line);
      }
      .question-no {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: .08em;
      }
      .question-title {
        margin: 10px 0 18px;
        font-size: 28px;
        line-height: 1.5;
        color: var(--ink);
        font-weight: 500;
      }
      .options {
        display: grid;
        gap: 12px;
      }
      .option {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px 16px;
        background: rgba(255,255,255,0.72);
        cursor: pointer;
        transition: border-color .2s ease, background-color .2s ease, box-shadow .2s ease;
      }
      .option:hover {
        border-color: rgba(74, 48, 115, 0.28);
        background: rgba(74, 48, 115, 0.05);
      }
      .option input { display: none; }
      .option-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .option-label {
        font-size: 16px;
        color: var(--ink);
      }
      .option-tag {
        color: var(--muted);
        font-size: 12px;
      }
      .option.selected {
        border-color: rgba(74, 48, 115, 0.4);
        background: rgba(74, 48, 115, 0.08);
        box-shadow: 0 8px 20px rgba(74, 48, 115, 0.08);
      }
      .result-emoji {
        font-size: 46px;
      }
      .result-name {
        margin: 8px 0 6px;
        font-family: "Cormorant Garamond", "Noto Serif SC", serif;
        font-size: 42px;
        letter-spacing: .04em;
      }
      .result-desc {
        margin: 12px 0 0;
        color: #55505e;
        font-size: 15px;
      }
      .score-grid {
        display: grid;
        gap: 10px;
        margin-top: 20px;
      }
      .score-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(74, 48, 115, 0.05);
        border: 1px solid var(--line);
        color: #534d5f;
        font-size: 14px;
      }
      .score-item strong { color: var(--brand); }
      @media (max-width: 640px) {
        .title { font-size: 36px; }
        .question-title { font-size: 23px; }
        .result-name { font-size: 34px; }
        .panel { padding: 24px 18px; }
      }
    

    .result-viz {
      margin-bottom: 28px;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .score-row:last-child { margin-bottom: 0; }
    .score-label {
      font-family: "Noto Serif SC", "Cormorant Garamond", serif;
      font-size: 11px;
      color: rgba(47,42,38,0.72);
      width: 64px;
      flex-shrink: 0;
    }
    .score-bar-bg {
      flex: 1;
      height: 10px;
      background: rgba(74,48,115,0.1);
      border-radius: 999px;
      overflow: hidden;
    }
    .score-bar-fill {
      width: 0;
      height: 100%;
      background: #4A3073;
      border-radius: 999px;
      box-shadow: 0 4px 12px rgba(74,48,115,0.22);
      transition: width 0.8s ease;
    }
    .score-val {
      font-size: 11px;
      color: #4A3073;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }
    .r-head {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }
    .r-head::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #4A3073;
      transform: translateY(-2px);
      flex-shrink: 0;
    }
    .r-type {
      font-family: "Noto Serif SC", "Cormorant Garamond", serif;
      font-size: 30px;
      color: #2e2e2e;
      margin: 0;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .r-score-line {
      position: relative;
      z-index: 1;
      font-size: 11px;
      color: #4A3073;
      letter-spacing: 0.08em;
      margin: 0 0 16px;
    }
    .result-tags {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 20px;
      padding: 0;
      list-style: none;
    }
    .result-tags:empty { display: none; }
    .result-tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(74,48,115,0.35);
      background: rgba(245,240,235,0.96);
      color: #4A3073;
      font-size: 12px;
      line-height: 1;
      text-transform: none;
      letter-spacing: 0.02em;
    }
    .r-divider {
      height: 1px;
      background: rgba(74,48,115,0.15);
      margin-bottom: 20px;
    }
    .r-quote {
      position: relative;
      z-index: 1;
      margin: 0 0 20px;
      padding: 16px 18px;
      border-left: 3px solid #4A3073;
      background: rgba(74,48,115,0.06);
      color: #3d3158;
      line-height: 1.9;
      font-size: 14px;
    }
    .r-quote:empty { display: none; }
    .r-desc {
      position: relative;
      z-index: 1;
      font-size: 14px;
      color: #554c47;
      line-height: 1.9;
      padding: 24px;
      background: rgba(255,255,255,0.45);
      border-radius: 20px;
    }
    .r-desc p {
      margin: 0 0 1.4em;
    }
    .r-desc p:last-child {
      margin-bottom: 0;
    }

.story-rec {
  background: rgba(255,255,255,0.8);
  border-radius: 16px;
  border: 1px solid rgba(74,48,115,0.15);
  overflow: hidden;

}

.story-rec-img {
  width: 100%;
  height: 100px;
  background: radial-gradient(ellipse at center, rgba(74,48,115,0.18), rgba(74,48,115,0.05));
}

.story-rec-content {
  padding: 16px 20px;
}

.story-rec-hint {
  font-family: "Noto Serif SC", serif;

  margin-bottom: 6px;
}

.story-rec-title {
  font-family: "Cormorant Garamond", serif;
  font-size: 20px;

}

.story-rec-btn {
  display: block;

  font-size: 12px;

  border: 1px solid rgba(74,48,115,0.3);
  padding: 10px 0;

}


      .result-actions { display: flex; flex-direction: column; align-items: stretch; gap: 12px; margin-top: 20px; }
      .result-back-btn, .result-retry-btn { display: block; width: 100%; text-align: center; }
      .result-retry-btn.ghost {
        border: 1px solid rgba(187, 187, 187, .45);
        background: transparent;
        color: #bbb;
        border-radius: 999px;
        padding: 12px 18px;
      }
      .result-retry-btn.ghost:hover { color: #a6a6a6; border-color: rgba(166, 166, 166, .65); }

</style>

</head>
  <body>
    <div class="glow top" aria-hidden="true"></div>
    <div class="glow bottom" aria-hidden="true"></div>
    <main class="page">
      <a class="back" href="assessment.html">← 返回测评</a>
      <div class="progress-shell"><div class="progress-bar" id="progressBar"></div></div>
      <div class="meta"><span id="progressText">INTRO</span><span>12 QUESTIONS · 5 TYPES</span></div>

      <section class="panel" id="introView">
        <p class="eyebrow">Ideal Boyfriend Archetype</p>
        <h1 class="title">你的理想型男友</h1>
        <p class="subtitle">一份关于陪伴节奏、情绪气候与亲密偏好的轻测验。</p>
        <div class="intro-card">
          <p class="body-copy">不是在挑一个“最好的人”，而是在辨认：什么样的男性气质，会让你真正感到被理解、被安放、被点亮。</p>
          <ul class="intro-points">
            <li>12 道单选题，按第一直觉作答即可。</li>
            <li>结果会落在 5 个原型之一：守灯 / 野风 / 对镜 / 栖木 / 夜谈。</li>
            <li>完成后可直接查看结果描述，并返回测评页。</li>
          </ul>
        </div>
        <div class="btn-row">
          <button class="primary" id="startBtn">开始测试</button>
          <a class="link-btn" href="assessment.html">先返回</a>
        </div>
      </section>

      <section class="panel hidden" id="quizView">
        <div class="question-no" id="questionNo"></div>
        <h2 class="question-title" id="questionTitle"></h2>
        <div class="options" id="options"></div>
        <div class="btn-row">
          <button class="ghost" id="prevBtn">上一题</button>
          <button class="primary" id="nextBtn">下一题</button>
        </div>
      </section>

      <section class="panel hidden" id="resultView"></section>
    </main>

    <script>
      let storyRec;
      window.addEventListener('DOMContentLoaded', () => {
        storyRec = document.getElementById('storyRec');
        if (storyRec) storyRec.style.display = 'none';
      });
      const archetypes = {
        keeper: {
          name: '守灯',
          emoji: '🕯️',
          subtitle: '稳定发亮型',
          description: "<p>你心里想要的那个人，是一个让你安心的存在。你不需要惊天动地的浪漫，你需要的是稳稳地在那里。每次你回头，他都在。</p><p>你渴望的是一种可以信赖的长期感。他的承诺有分量，他的陪伴有耐心，他不会因为一次吵架就消失，也不会因为新鲜感消退就走远。他选了你，就会一直选你。</p><p>安全感对你来说，是爱情里最重要的基础设施。你见过太多不确定，太多说走就走。你想要的那种关系，是可以放心把未来交出去的关系。</p><p>你值得那种踏实。那种\"明天、后天、很久以后，他都会在\"的踏实。这是你的爱情底线，也是你最深的需要。</p>"
        },
        wild: {
          name: '野风',
          emoji: '🌬️',
          subtitle: '自由生命型',
          description: "<p>吸引你的，从来都是那种带风的人。自由、不可预测、活着的感觉。和他在一起，你永远不知道下一秒会发生什么，而你喜欢这种感觉。</p><p>你在规则和秩序里待了太久。所以在爱情里，你渴望的是一个打破规则的人，一种让你觉得活过来的能量。你要的是真实的、有温度的、会烫手的东西。</p><p>你喜欢那种心跳加速的感觉。一段让你紧张的对话、一次说走就走的旅行、一个永远让你猜不透的眼神。你要的是炽热的、活着的关系。</p><p>你知道这种偏好有风险。野生的能量很难被驯服，自由的人很难被留住。但你宁愿要这样的，也不想要温吞却无趣的日子。</p><p>你要的那个人，能带你去你自己不敢去的地方。</p>"
        },
        mirror: {
          name: '对镜',
          emoji: '🪞',
          subtitle: '深度理解型',
          description: "<p>你想要的那个人，最重要的能力只有一个：看见你。真正地看见——你说了一半的话，他能接住后一半。你还没有开口的情绪，他已经感觉到了。</p><p>你渴望被理解到一种很深的程度。那种不用解释、他就已经懂了的默契，对你来说是真实的需要，比心动更性感。</p><p>你可能经历过太多\"看不到你\"的关系——对方爱的是一个想象中的你，或者一个你表演出来的你。那种错位让你很累，也让你很孤独。</p><p>所以你在等一面镜子。一个人站在你面前，让你从他的眼睛里看到自己真实的样子——包括你的好、你的暗面、你自己都不太敢看的那些部分。</p><p>这种深度的看见，是你能想象到的最亲密的事情。比拥抱更近，比说\"我爱你\"更有分量。</p>"
        },
        nest: {
          name: '栖木',
          emoji: '🪺',
          subtitle: '安心停靠型',
          description: "<p>你心里有一种很深的渴望——被包裹。你想要的那个人，能给你一种回家的感觉。不是一栋房子，是一种温度，一种让你可以把所有的坚强都放下的安全。</p><p>你在外面已经撑得够多了。独立、能干、什么都能处理。但那些在别人看来\"很厉害\"的时刻，你心里经常有一个声音：好想有个人接住我。</p><p>你想要的照顾很具体：一碗热的东西、一个不需要解释的拥抱、一个替你做了决定让你不用想的晚上。你需要有人把你照顾好，像你一直照顾别人那样。</p><p>需要温暖不是软弱，它是你最诚实的心声。你值得一个巢。一个让你可以蜷缩进去、不设防、完全放松的地方。</p>"
        },
        midnight: {
          name: '夜谈',
          emoji: '🌙',
          subtitle: '灵魂对话型',
          description: "<p>你被深度吸引。那种白天不太会出现的对话、那种安静房间里才会有的眼神、那种需要剥开很多层才能触到的灵魂——这些才是让你心动的东西。</p><p>你想要的那个人身上有一种暗色调的质感。他有故事，有伤疤，有被生活打磨过的痕迹。他更像午夜电台的声音——低沉、有层次、让你想靠近去听。</p><p>你在明亮的、轻松的关系里反而觉得浅。你需要一种强度，一种让你在情感上被拉到很深的地方的力量。你要的不是陪你看日落的人，是陪你在黑暗里坐着也不害怕的人。</p><p>你对神秘感的迷恋里，有一部分是你自己的投射——你自己也有那些不太拿出来给人看的、深沉的、复杂的部分。你想要一个能和你共享那个深度的人。</p><p>午夜是所有面具都放下的时刻。你要的爱情，也是这样的。</p>"
        }
      };

      const questions = [
        {
          text: '一次疲惫又混乱的日子结束后，你最希望他怎么接住你？',
          options: [
            { text: '先给我稳定的安顿和照顾', tag: '安稳', scores: { keeper: 2, nest: 1 } },
            { text: '拉我出去透气，让状态重新流动起来', tag: '松动', scores: { wild: 2, midnight: 1 } },
            { text: '陪我把情绪说清楚，认真听我讲', tag: '理解', scores: { mirror: 2, midnight: 1 } }
          ]
        },
        {
          text: '你更容易被哪种靠近方式打动？',
          options: [
            { text: '持续、靠谱、不忽冷忽热', tag: '持续', scores: { keeper: 2, nest: 1 } },
            { text: '自然有趣，不按套路但很真', tag: '鲜活', scores: { wild: 2, mirror: 1 } },
            { text: '一开口就像懂你很久', tag: '懂你', scores: { mirror: 2, midnight: 1 } }
          ]
        },
        {
          text: '如果一起旅行，你最期待他带来的感受是？',
          options: [
            { text: '行程安心，不用我操心太多', tag: '可靠', scores: { keeper: 2, nest: 1 } },
            { text: '有点冒险感，临时改计划也无妨', tag: '自由', scores: { wild: 2, midnight: 1 } },
            { text: '路上会聊很多，像一起穿过内心', tag: '共鸣', scores: { mirror: 2, midnight: 1 } }
          ]
        },
        {
          text: '当你脆弱时，最怕遇到怎样的人？',
          options: [
            { text: '嘴上关心，行动却总是缺席', tag: '失约', scores: { keeper: 2 } },
            { text: '过于控制，让我无法呼吸', tag: '压迫', scores: { wild: 2, nest: 1 } },
            { text: '只给建议，却没有真正理解我', tag: '失真', scores: { mirror: 2, midnight: 1 } }
          ]
        },
        {
          text: '你希望亲密关系更像哪种画面？',
          options: [
            { text: '厨房有灯，回家有人等', tag: '灯火', scores: { keeper: 2, nest: 1 } },
            { text: '一起上路，世界很大也敢去', tag: '远方', scores: { wild: 2 } },
            { text: '坐在窗边，把心事慢慢讲完', tag: '深聊', scores: { midnight: 2, mirror: 1 } }
          ]
        },
        {
          text: '在你心里，成熟更接近以下哪一种？',
          options: [
            { text: '答应的事情会做到', tag: '兑现', scores: { keeper: 2 } },
            { text: '有自己的方向，也尊重我的边界', tag: '松弛', scores: { wild: 2, nest: 1 } },
            { text: '能表达感受，也能理解复杂情绪', tag: '洞察', scores: { mirror: 2, midnight: 1 } }
          ]
        },
        {
          text: '你最想从一段爱里得到什么？',
          options: [
            { text: '被稳稳接住的安全感', tag: '安全', scores: { keeper: 2, nest: 1 } },
            { text: '一起活得更开阔的生命力', tag: '活力', scores: { wild: 2 } },
            { text: '被深深理解后的放松', tag: '理解', scores: { mirror: 2, midnight: 1 } }
          ]
        },
        {
          text: '如果他发来一条消息，你最容易因为什么心动？',
          options: [
            { text: '内容很简单，但总在我需要时出现', tag: '在场', scores: { keeper: 2, nest: 1 } },
            { text: '一句话就让我想笑，像风吹开窗', tag: '轻盈', scores: { wild: 2 } },
            { text: '他记得我说过的细节，还愿意继续聊下去', tag: '记得', scores: { mirror: 2, midnight: 1 } }
          ]
        },
        {
          text: '你更欣赏他身上的哪种力量？',
          options: [
            { text: '沉着、稳定、关键时刻不掉线', tag: '定力', scores: { keeper: 2, nest: 1 } },
            { text: '敢冒险，有一点野，也有一点光', tag: '锋芒', scores: { wild: 2 } },
            { text: '有观察力，也有表达的诚意', tag: '敏锐', scores: { mirror: 2, midnight: 1 } }
          ]
        },
        {
          text: '你理想中的约会，更像下面哪一项？',
          options: [
            { text: '一起做饭、散步、看很普通却温柔的夜', tag: '日常', scores: { nest: 2, keeper: 1 } },
            { text: '说走就走，去看陌生的风景', tag: '冒险', scores: { wild: 2 } },
            { text: '找一家安静的店，从天黑聊到打烊', tag: '对话', scores: { midnight: 2, mirror: 1 } }
          ]
        },
        {
          text: '当关系进入平稳期，你最希望它保留什么？',
          options: [
            { text: '照旧可靠的陪伴和行动', tag: '恒定', scores: { keeper: 2, nest: 1 } },
            { text: '仍然有惊喜，不被日常困住', tag: '流动', scores: { wild: 2 } },
            { text: '依旧愿意交换真实想法与感受', tag: '真心', scores: { mirror: 2, midnight: 1 } }
          ]
        },
        {
          text: '最后，你觉得真正让你爱上的，通常是什么？',
          options: [
            { text: '他让我觉得生活可以被托付', tag: '托付', scores: { keeper: 2, nest: 1 } },
            { text: '他让我看见更自由、更有趣的自己', tag: '打开', scores: { wild: 2 } },
            { text: '他让我感到灵魂有回声', tag: '回声', scores: { midnight: 2, mirror: 1 } }
          ]
        }
      ];

      const state = { current: -1, answers: new Array(questions.length).fill(null) };

      const introView = document.getElementById('introView');
      const quizView = document.getElementById('quizView');
      const resultView = document.getElementById('resultView');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const questionNo = document.getElementById('questionNo');
      const questionTitle = document.getElementById('questionTitle');
      const optionsEl = document.getElementById('options');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const startBtn = document.getElementById('startBtn');

      function updateProgress() {
        if (state.current < 0) {
          progressBar.style.width = '0%';
          progressText.textContent = 'INTRO';
          return;
        }
        const percent = ((state.current + 1) / questions.length) * 100;
        progressBar.style.width = percent + '%';
        progressText.textContent = 'Q ' + (state.current + 1) + ' / ' + questions.length;
      }

      function getStoryRec() {
        storyRec = document.getElementById('storyRec');
        return storyRec;
      }

      function setStoryRecDisplay(value) {
        const el = getStoryRec();
        if (el) el.style.display = value;
      }

      function renderQuestion() {
        const question = questions[state.current];
        questionNo.textContent = 'QUESTION ' + (state.current + 1);
        questionTitle.textContent = question.text;
        optionsEl.innerHTML = '';

        question.options.forEach((option, index) => {
          const label = document.createElement('label');
          label.className = 'option';
          if (state.answers[state.current] === index) {
            label.classList.add('selected');
          }
          label.innerHTML = `
            <input type="radio" name="answer" value="${index}" ${state.answers[state.current] === index ? 'checked' : ''}>
            <div class="option-top">
              <span class="option-label">${option.text}</span>
              <span class="option-tag">${option.tag}</span>
            </div>
          `;
          label.addEventListener('click', function () {
            state.answers[state.current] = index;
            renderQuestion();
          });
          optionsEl.appendChild(label);
        });

        prevBtn.style.visibility = state.current === 0 ? 'hidden' : 'visible';
        nextBtn.textContent = state.current === questions.length - 1 ? '查看结果' : '下一题';
        setStoryRecDisplay('none');
        updateProgress();
      }

      function startQuiz() {
        state.current = 0;
        introView.classList.add('hidden');
        resultView.classList.add('hidden');
        setStoryRecDisplay('none');
        quizView.classList.remove('hidden');
        setStoryRecDisplay('none');
        renderQuestion();
      }

      function getResult() {
        const totals = { keeper: 0, wild: 0, mirror: 0, nest: 0, midnight: 0 };
        state.answers.forEach((answerIndex, questionIndex) => {
          const selected = questions[questionIndex].options[answerIndex];
          Object.keys(selected.scores).forEach((key) => {
            totals[key] += selected.scores[key];
          });
        });
        const winner = Object.keys(totals).sort((a, b) => totals[b] - totals[a])[0];
        return { winner, totals };
      }


      function formatParagraphs(text) {
        return String(text || '').split(/\n+/).filter(Boolean).map(item => `<p>${item.replace(/<[^>]+>/g, '')}</p>`).join('');
      }
      function buildVizRows(scores) {
        const total = scores.reduce((sum, [, value]) => sum + value, 0) || 1;
        return scores.map(([key, value]) => `
          <div class="score-row">
            <span class="score-label">${archetypes[key].name}</span>
            <div class="score-bar-bg"><div class="score-bar-fill" style="width:${(value / total * 100).toFixed(0)}%"></div></div>
            <span class="score-val">${(value / total * 100).toFixed(0)}%</span>
          </div>
        `).join('');
      }
      const storyIllustrations = {
        'story-detail.html': 'illustrations/story-queqie.png',
        'story-tuanzi-v3.html': 'illustrations/story-tuanzi.png',
        'story-xiaochen.html': 'illustrations/story-xiaochen.png',
        'story-xiaoli.html': 'illustrations/story-xiaoli.png',
        'story-xiuxiu.html': 'illustrations/story-xiuxiu.png',
        'story-zixingche.html': 'illustrations/story-zixingche.png',
        'story-bingbing.html': 'illustrations/story-bingbing.png'
      };

      const defaultStoryRecommendation = { title: '曲奇：真空里的野蛮生长', url: 'story-detail.html', img: 'illustrations/story-queqie.png' };

      function updateStoryBar(rec = defaultStoryRecommendation) {
        const currentStoryRec = getStoryRec();
        const titleEl = document.querySelector('#storyRec .story-rec-title');
        const goBtn = document.querySelector('#storyRec .story-rec-btn');
        if (!currentStoryRec || !titleEl || !goBtn || !rec) return;
        const imgEl = document.querySelector('#storyRec .story-rec-img');
        const illustrationPath = rec.img || storyIllustrations[rec.url];
        titleEl.textContent = rec.title;
        goBtn.href = rec.url;
        if (imgEl && illustrationPath) {
          imgEl.style.background = `url('${illustrationPath}') center/cover no-repeat`;
        }
        currentStoryRec.style.display = 'block';
      }

      function showResult() {
        const result = getResult();
        const active = archetypes[result.winner];
        const orderedScores = Object.entries(result.totals).sort((a, b) => b[1] - a[1]);

        quizView.classList.add('hidden');
        resultView.classList.remove('hidden');
        progressBar.style.width = '100%';
        progressText.textContent = 'RESULT';

        resultView.innerHTML = `
          <div id="result-capture" class="result-capture-card">
          <div class="result-viz">${buildVizRows(orderedScores)}</div>
          <div class="r-head"><h2 class="r-type" data-subtitle="${active.subtitle || ''}">${active.name}</h2></div>
          <p class="r-score-line">最高匹配：${active.emoji} ${active.name}</p>
          <ul class="result-tags"><li class="result-tag">${active.subtitle}</li><li class="result-tag">理想型男友</li><li class="result-tag">12 QUESTIONS</li></ul>
          <div class="r-quote">${active.subtitle || active.name}</div>
          <div class="r-divider"></div>
          <div class="r-desc">${active.description}</div>
          <div class="score-grid">
            ${orderedScores.map(([key, score]) => `<div class="score-item"><span>${archetypes[key].emoji} ${archetypes[key].name}</span><strong>${score} 分</strong></div>`).join('')}
          </div>
<div class="result-actions"><button class="result-save-btn" id="saveResultBtn" type="button" onclick="downloadResult()">保存结果图片</button><p class="result-guide">这是你心理画像的一部分 · <a href="index.html#assessment">查看全部测评</a></p><a href="index.html" class="result-back-btn">返回首页</a><button class="result-retry-btn ghost" id="redoBtn" type="button">再做一次</button></div>
          <div class="story-rec" id="storyRec" style="display:none;">
  <div class="story-rec-img"></div>
  <div class="story-rec-content">
    <p class="story-rec-hint">你可能会有共鸣</p>
    <h3 class="story-rec-title">故事标题</h3>
    <a class="story-rec-btn" href="#">读这个故事 →</a>
  </div>
</div>
          </div>
        `;

        updateStoryBar();
        document.getElementById('redoBtn').onclick = restartQuiz;
      }

      function restartQuiz() {
        state.current = -1;
        state.answers = new Array(questions.length).fill(null);
        quizView.classList.add('hidden');
        resultView.classList.add('hidden');
        setStoryRecDisplay('none');
        introView.classList.remove('hidden');
        setStoryRecDisplay('none');
        updateProgress();
      }

      prevBtn.addEventListener('click', function () {
        if (state.current > 0) {
          state.current -= 1;
          renderQuestion();
        }
      });

      nextBtn.addEventListener('click', function () {
        if (state.answers[state.current] === null) {
          alert('先选择一个答案。');
          return;
        }
        if (state.current === questions.length - 1) {
          showResult();
          return;
        }
        state.current += 1;
        renderQuestion();
      });

      startBtn.addEventListener('click', startQuiz);
      resultView.addEventListener('click', (event) => {
        if (event.target && (event.target.id === 'retryBtn' || event.target.id === 'restartBtn')) restartQuiz();
      });


      function downloadResult() {
  const button = document.getElementById('saveResultBtn');
  const originalText = button ? button.textContent : '保存结果图片';
  if (button) {
    button.disabled = true;
    button.textContent = '保存中…';
  }
  try {
    const topScore = document.querySelector('#result-capture .score-item strong')?.textContent?.trim() || '';
    generateResultCard({
      testName: '理想男友原型测评',
      resultType: document.querySelector('#result-capture .r-type')?.textContent?.trim() || '测试结果',
      resultSubtitle: document.querySelector('#result-capture .r-type')?.dataset?.subtitle || '',
      quote: extractResultCardQuote(document.querySelector('#result-capture .r-desc')?.textContent, '你在表达里确认自己的存在。'),
      score: topScore ? `最高匹配 ${topScore}` : '',
      fileName: 'ideal-boyfriend-result'
    });
  } finally {
    if (button) {
      button.disabled = false;
      button.textContent = originalText;
    }
  }
}

window.downloadResult = downloadResult;
      updateProgress();
    </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
